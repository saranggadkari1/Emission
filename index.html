// ══════════════════════════════════════════════════════════
//  APPLICABILITY LOGIC
// ══════════════════════════════════════════════════════════
function determineApplicableSections() {
  const a = answers;
  // derive flags
  const isCar       = a.vtype === 'car';
  const isMPV       = a.vtype === 'mpv';
  const isTruck     = a.vtype === 'truck';
  const isBus       = a.vtype === 'bus';
  const isMotorcycle= a.vtype === 'motorcycle';
  const isTrailer   = a.vtype === 'trailer';
  const isLSV       = a.vtype === 'lsv';
  const isLight     = a.gvwr === 'light';
  const isHeavy     = a.gvwr === 'heavy';
  const isS10plus   = a.seating === 's10plus';
  const isTruckCh   = a.chassis === 'truck_chassis';
  const isSchoolBus = Array.isArray(a.use) && a.use.includes('school_bus');
  const isAmbulance = Array.isArray(a.use) && a.use.includes('ambulance');
  const isMotorHome = Array.isArray(a.use) && a.use.includes('motor_home');
  const isICE       = a.propulsion === 'ice';
  const isCNG       = a.propulsion === 'cng';
  const isEV        = a.propulsion === 'ev';
  const isHydrogen  = a.propulsion === 'hydrogen';
  const isHybrid    = a.propulsion === 'hybrid';
  const isLowSpd    = a.max_speed === 'low_speed';
  const isLongCargo = Array.isArray(a.body) && a.body.includes('long_cargo');
  const isPneuLight = a.tire === 'pneumatic_light';
  const isPneuHeavy = a.tire === 'pneumatic_heavy';
  const isNonPneu   = a.tire === 'non_pneumatic';
  const isPost2024  = a.dom === 'post2024';
  const is2018plus  = a.dom === '2018to2024' || isPost2024;
  const is2000plus  = a.dom === '2000to2017' || is2018plus;
  const isPre2000   = a.dom === 'pre2000';
  const isComplete  = a.stage === 'complete';
  const isIncomplete= a.stage === 'incomplete';
  const isIntermed  = a.stage === 'intermediate';
  const isFinalStg  = a.stage === 'final_stage';
  const isAlterer   = a.stage === 'alterer';
  const isReplica   = a.stage === 'replica';
  const isMultiStg  = isIncomplete || isIntermed || isFinalStg;
  const isEnclosed  = !isLSV && !isMotorcycle;
  const isLightVeh  = (isCar || isMPV || (isTruck && isLight));
  const isLargeVeh  = isHeavy || (isBus && isS10plus);

  const result = {};
  for (const sec of SECTIONS) {
    let applies = false;
    let note = '';

    switch(sec.sec) {
      // 101 controls
      case '101': applies = !isMotorcycle && !isTrailer && !isLSV; note = applies ? 'Applies to enclosed motor vehicles.' : 'Exempt: motorcycles use FMVSS 123; LSV/trailers exempt.'; break;
      case '102': applies = (isCar || isMPV || isTruck) && !isMotorcycle && !isLSV; note = applies ? 'Applies to vehicles with automatic transmissions.' : 'Not applicable to this vehicle type.'; break;
      case '103': applies = isEnclosed && !isTrailer && !isLSV; note = applies ? 'Applies to all enclosed motor vehicles.' : 'Exempt.'; break;
      case '104': applies = isEnclosed && !isTrailer && !isLSV; note = applies ? 'Applies to all enclosed motor vehicles.' : 'Exempt.'; break;
      case '105': applies = isLightVeh && !isMotorcycle && !isTrailer; note = applies ? 'Applies to light vehicles with hydraulic/electric brakes.' : 'Not applicable — use FMVSS 121 for air brakes, FMVSS 135 for current light vehicle standard.'; break;
      case '106': applies = !isLSV && (isICE || isCNG || isEV || isHydrogen || isHybrid) && !isMotorcycle; note = applies ? 'Applies to all vehicles with hydraulic or air brake hose.' : 'Exempt.'; break;
      case '108': applies = true; note = 'FMVSS 108 applies to all motor vehicles and trailers.'; break;
      case '109': applies = isPneuLight && !isPost2024; note = applies ? 'May apply for bias-ply or specialty tires.' : 'Most new light vehicles use FMVSS 139 (radial). Check if bias-ply.'; break;
      case '110': applies = isLight && !isMotorcycle && !isTrailer; note = applies ? 'Tire placard required for light vehicles.' : 'Heavy vehicles use FMVSS 120.'; break;
      case '111': applies = isLightVeh && is2018plus; note = applies ? 'Rear camera required (effective May 2018 for new light vehicles).' : 'Older vehicles or non-light-vehicle types — check production date.'; break;
      case '113': applies = (isCar || isMPV || isTruck) && !isMotorcycle; note = applies ? 'Applies to front-opening hoods.' : 'Exempt.'; break;
      case '114': applies = !isTrailer && !isLSV; note = applies ? 'Applies to all motor vehicles.' : 'Trailers and LSVs exempt.'; break;
      case '116': applies = !isMotorcycle && !isTrailer && !isLSV && !isEV && !isHydrogen; note = applies ? 'Applies to vehicles with hydraulic brakes requiring brake fluid.' : 'EV/hydrogen/exempt types not applicable.'; break;
      case '117': applies = false; note = 'Retreaded tires — only if using retreads.'; break;
      case '118': applies = (isCar || isMPV || isTruck || isBus) && !isLSV; note = applies ? 'Applies if power windows/sunroof/partition is fitted.' : 'Exempt.'; break;
      case '119': applies = (isHeavy && !isTrailer) || isMotorcycle; note = applies ? 'Heavy vehicle/motorcycle tires — FMVSS 119 applies.' : 'Light vehicle tires use FMVSS 139.'; break;
      case '120': applies = isHeavy && !isMotorcycle; note = applies ? 'Tire selection placard for heavy vehicles.' : 'Light vehicles use FMVSS 110.'; break;
      case '121': applies = isHeavy && (isTruck || isBus || isTrailer); note = applies ? 'Applies if vehicle has air brakes.' : 'Not applicable — check if air brakes are fitted.'; break;
      case '122': applies = isMotorcycle && isPre2000; note = applies ? 'Original motorcycle brake standard.' : 'Use FMVSS 122a for new motorcycles.'; break;
      case '122a': applies = isMotorcycle; note = applies ? 'Current motorcycle brake standard applies.' : 'Not a motorcycle.'; break;
      case '123': applies = isMotorcycle; note = applies ? 'Motorcycle controls standard applies.' : 'Not a motorcycle.'; break;
      case '124': applies = !isTrailer && !isLSV; note = applies ? 'Applies to all motor vehicles with accelerator pedal.' : 'Trailers/LSV exempt.'; break;
      case '125': applies = isHeavy && (isTruck || isBus); note = applies ? 'Warning devices required for heavy trucks and buses.' : 'Not required for this vehicle class.'; break;
      case '126': applies = isLightVeh; note = applies ? 'ESC required for all new light vehicles.' : 'Heavy vehicle ESC uses FMVSS 136.'; break;
      case '127': applies = isLightVeh && isPost2024; note = applies ? 'AEB required for new light vehicles MY2025+.' : 'Pre-2025 vehicles exempt; heavy vehicles not covered.'; break;
      case '129': applies = isCar && isNonPneu; note = applies ? 'Non-pneumatic tires on passenger car.' : 'Only if non-pneumatic tires fitted on passenger car.'; break;
      case '131': applies = isSchoolBus; note = applies ? 'School bus pedestrian safety devices required.' : 'Not a school bus.'; break;
      case '135': applies = isLightVeh && !isMotorcycle; note = applies ? 'Modern light vehicle brake standard applies.' : 'Heavy vehicles use FMVSS 121.'; break;
      case '136': applies = isHeavy && (isTruck || isBus) && isHeavy; note = applies ? 'Heavy vehicle ESC required for vehicles > 26,000 lb GVWR.' : 'Light vehicle ESC uses FMVSS 126.'; break;
      case '138': applies = isLightVeh; note = applies ? 'TPMS required for light vehicles.' : 'Not required for this vehicle class.'; break;
      case '139': applies = isLightVeh && isPneuLight; note = applies ? 'New pneumatic radial tires for light vehicles.' : 'Use FMVSS 119 for heavy vehicles; 109 for bias-ply.'; break;
      case '141': applies = isEV || isHybrid; note = applies ? 'Minimum sound (AVAS) required for EV/hybrid at low speed.' : 'ICE vehicles have sufficient acoustic signature.'; break;

      // 200s
      case '201': applies = isLightVeh; note = applies ? 'Interior head impact protection for light vehicles.' : 'Not applicable.'; break;
      case '202a': applies = isLightVeh; note = applies ? 'Head restraints required.' : 'Not applicable.'; break;
      case '203': applies = isCar; note = applies ? 'Steering impact protection — passenger cars.' : 'Applies to passenger cars only.'; break;
      case '204': applies = isCar; note = applies ? 'Steering displacement — passenger cars.' : 'Applies to passenger cars only.'; break;
      case '205': applies = true; note = 'Glazing requirements apply to all motor vehicles.'; break;
      case '206': applies = (isCar || isMPV || isTruck) && !isMotorcycle; note = applies ? 'Door lock/retention applies.' : 'Not applicable.'; break;
      case '207': applies = !isMotorcycle && !isTrailer; note = applies ? 'Seating system strength applies.' : 'Motorcycles/trailers exempt.'; break;
      case '208': applies = isLightVeh || isBus; note = applies ? 'Occupant crash protection applies.' : 'Not applicable.'; break;
      case '209': applies = !isMotorcycle && !isTrailer; note = applies ? 'Seat belt assembly requirements apply.' : 'Motorcycles/trailers exempt.'; break;
      case '210': applies = !isMotorcycle && !isTrailer; note = applies ? 'Seat belt anchorage requirements apply.' : 'Motorcycles/trailers exempt.'; break;
      case '212': applies = (isCar || isMPV || isTruck) && !isMotorcycle; note = applies ? 'Windshield mounting requirements apply.' : 'Not applicable.'; break;
      case '213': applies = false; note = 'Applies to child restraint equipment manufacturers, not vehicle manufacturers directly.'; break;
      case '213a': applies = false; note = 'Child restraint side impact — applies to child restraint equipment manufacturers.'; break;
      case '214': applies = isLightVeh; note = applies ? 'Side impact protection required.' : 'Not applicable to this class.'; break;
      case '216a': applies = isLightVeh; note = applies ? 'Roof crush resistance required.' : 'School buses use FMVSS 220.'; break;
      case '217': applies = isBus; note = applies ? 'Bus emergency exit requirements apply.' : 'Not a bus.'; break;
      case '217a': applies = isBus && isHeavy && isPost2024; note = applies ? 'Anti-ejection glazing mandatory October 2027 for heavy buses.' : 'Not applicable — check vehicle type and date.'; break;
      case '218': applies = isMotorcycle; note = applies ? 'Motorcycle helmet standard applies to helmet manufacturers.' : 'Not a motorcycle.'; break;
      case '219': applies = isCar; note = applies ? 'Windshield zone intrusion — passenger cars.' : 'Applies to passenger cars only.'; break;
      case '220': applies = isSchoolBus; note = applies ? 'School bus rollover protection applies.' : 'Not a school bus.'; break;
      case '221': applies = isSchoolBus; note = applies ? 'School bus body joint strength applies.' : 'Not a school bus.'; break;
      case '222': applies = isSchoolBus; note = applies ? 'School bus passenger seating applies.' : 'Not a school bus.'; break;
      case '223': applies = isTrailer && isHeavy; note = applies ? 'Rear impact guard equipment — heavy trailers.' : 'Not applicable.'; break;
      case '224': applies = isTrailer && isHeavy; note = applies ? 'Heavy trailer must be equipped with rear underride guard.' : 'Not applicable.'; break;
      case '225': applies = isLightVeh && !isTruck; note = applies ? 'LATCH child restraint anchorage required.' : 'Not required for trucks/heavy vehicles.'; break;
      case '226': applies = isLightVeh; note = applies ? 'Ejection mitigation (side curtain airbags) required.' : 'Not applicable.'; break;
      case '227': applies = isBus && isHeavy; note = applies ? 'Bus rollover structural integrity applies.' : 'Not applicable.'; break;

      // 300s
      case '301': applies = isICE && !isTrailer; note = applies ? 'Fuel system integrity for ICE vehicles.' : 'EV/CNG/H2 vehicles use FMVSS 303/305/307.'; break;
      case '302': applies = !isMotorcycle && !isTrailer; note = applies ? 'Interior flammability applies to all enclosed motor vehicles.' : 'Motorcycles/trailers exempt.'; break;
      case '303': applies = isCNG; note = applies ? 'CNG fuel system integrity applies.' : 'Not a CNG/LNG vehicle.'; break;
      case '304': applies = isCNG; note = applies ? 'CNG fuel container integrity applies.' : 'Not a CNG vehicle.'; break;
      case '305': applies = (isEV || isHybrid) && !isPost2024; note = applies ? 'EV electrolyte/shock protection applies (use 305a for MY2027+).' : 'Use FMVSS 305a for newer EVs, or not an EV/hybrid.'; break;
      case '305a': applies = (isEV || isHybrid) && isPost2024; note = applies ? 'New EV powertrain integrity standard (mandatory MY2027).' : 'Applies to post-2024 EVs/hybrids only.'; break;
      case '307': applies = isHydrogen; note = applies ? 'Hydrogen fuel system integrity applies.' : 'Not a hydrogen vehicle.'; break;
      case '308': applies = isHydrogen; note = applies ? 'Compressed hydrogen storage integrity applies.' : 'Not a hydrogen vehicle.'; break;

      // 400s
      case '401': applies = isCar; note = applies ? 'Interior trunk release — passenger cars with enclosed trunks.' : 'Not a passenger car with trunk.'; break;
      case '403': applies = false; note = 'Applies only if a platform lift is installed on the vehicle.'; break;
      case '404': applies = false; note = 'Applies only if a platform lift is installed on the vehicle.'; break;
      case '500': applies = isLSV; note = applies ? 'FMVSS 500 applies to low-speed vehicles.' : 'Not a low-speed vehicle.'; break;

      // Part 567
      case '567.4': applies = isComplete || (!isMultiStg && !isAlterer && !isReplica); note = applies ? 'Single-stage manufacturer certification label required.' : 'Not a single-stage manufacturer — use 567.5 or 567.6.'; break;
      case '567.5': applies = isMultiStg || isIncomplete || isFinalStg; note = applies ? 'Multi-stage manufacturer certification label requirements apply.' : 'Not a multi-stage manufacturer.'; break;
      case '567.6': applies = isAlterer; note = applies ? 'Alterer certification label requirements apply.' : 'Not an alterer.'; break;
      case '567.7': applies = isReplica; note = applies ? 'Replica manufacturer certification requirements apply.' : 'Not a replica manufacturer.'; break;

      // Part 568
      case '568.4': applies = isIncomplete; note = applies ? 'You must provide an Incomplete Vehicle Document with each vehicle.' : 'Only applies to incomplete vehicle manufacturers.'; break;
      case '568.5': applies = isIntermed; note = applies ? 'Intermediate manufacturer must update and pass through the IVD.' : 'Only applies to intermediate manufacturers.'; break;
      case '568.6': applies = isFinalStg; note = applies ? 'Final-stage manufacturer bears certification responsibility for the completed vehicle.' : 'Only applies to final-stage manufacturers.'; break;
      case '568.7': applies = isMultiStg; note = applies ? 'IVD content requirements apply to your stage of manufacture.' : 'Not in a multi-stage manufacturing chain.'; break;
      case '568.8': applies = isMultiStg; note = applies ? 'Recall cost reimbursement provisions apply.' : 'Not in a multi-stage manufacturing chain.'; break;

      default: applies = false; note = 'Check applicability manually.';
    }

    result[sec.sec] = { applies, note };
  }

  // ─── Supersession pass: if a newer standard applies, mark the old one N/A ───
  const supersessions = [
    // newer standard, older standard, condition (function of applic results), reason
    { newer:'135', older:'105',
      cond: () => result['135'] && result['135'].applies,
      reason:'Superseded by FMVSS 135 (current light-vehicle brake standard).' },
    { newer:'122a', older:'122',
      cond: () => result['122a'] && result['122a'].applies,
      reason:'Superseded by FMVSS 122a (current motorcycle brake standard).' },
    { newer:'202a', older:'202',
      cond: () => result['202a'] && result['202a'].applies,
      reason:'Superseded by FMVSS 202a (current head restraint standard).' },
    { newer:'216a', older:'216',
      cond: () => result['216a'] && result['216a'].applies,
      reason:'Superseded by FMVSS 216a (upgraded roof crush standard).' },
    { newer:'305a', older:'305',
      cond: () => result['305a'] && result['305a'].applies,
      reason:'Superseded by FMVSS 305a from MY2027.' },
    // 121 air-brake supersession of 105 for heavy-air-brake vehicles
    { newer:'121', older:'105',
      cond: () => result['121'] && result['121'].applies,
      reason:'Air-brake equipped vehicles certify to FMVSS 121, not 105.' },
  ];
  supersessions.forEach(sup => {
    if (sup.cond() && result[sup.older] && result[sup.older].applies) {
      result[sup.older] = { applies: false, note: sup.reason, superseded: true };
    }
  });

  return result;
}

// ══════════════════════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════════════════════
async function loadData() {
  try {
    const r = await fetch('/api/load');
    const d = await r.json();
    if (d.answers) answers = d.answers;
    if (d.tracking) tracking = d.tracking;
    if (d.projectEnd) projectEnd = d.projectEnd;
    if (Array.isArray(d.users)) users = d.users;
    // Migrate old tracking data
    Object.keys(tracking).forEach(sec => { try { ensureTracking(sec); } catch(e) {} });
    // Auto-migrate legacy assignees → users on first load
    if (!users.length) _migrateLegacyAssignees();
    if (Object.keys(answers).length === QUESTIONS.length) {
      showView('results');
    } else {
      currentWizardStep = Math.max(0, Object.keys(answers).length);
      showView('wizard');
    }
  } catch(e) { showView('wizard'); }
  renderSidebar();
}

function scheduleSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveData, 400);
}

async function saveData() {
  try {
    await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers, tracking, projectEnd, users })
    });
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
//  VIEWS
// ══════════════════════════════════════════════════════════
function showView(v) {
  ['splash','wizard','results','dashboard','workload','users','forms'].forEach(id => {
    const el = document.getElementById('view-' + id);
    if (el) el.classList.toggle('hidden', id !== v);
  });
  currentView = v;
  if (v === 'wizard') renderWizard();
  if (v === 'results') renderResults();
  if (v === 'dashboard') renderDashboard();
  if (v === 'workload') renderWorkload();
  if (v === 'users') renderUsersView();
  if (v === 'forms') renderFormsView();
  renderSidebar();
}

function showWorkloadView() { showView('workload'); }

function showSidebarTab(tab) {
  currentSidebarTab = tab;
  document.querySelectorAll('.sidebar-tab').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='classify') || (i===1 && tab==='track'));
  });
  renderSidebar();
}

// ══════════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════════
function renderSidebar() {
  const body = document.getElementById('sidebar-body');
  if (currentSidebarTab === 'classify') {
    body.innerHTML = QUESTIONS.map((q, i) => {
      const ans = answers[q.id];
      const done = ans !== undefined && ans !== null && (!Array.isArray(ans) || ans.length > 0);
      const active = currentView === 'wizard' && currentWizardStep === i;
      let ansLabel = '';
      if (done) {
        if (Array.isArray(ans)) {
          ansLabel = ans.map(v => (q.options.find(o=>o.val===v)||{label:v}).label).join(', ');
        } else {
          ansLabel = (q.options.find(o=>o.val===ans)||{label:ans}).label;
        }
        if (ansLabel.length > 28) ansLabel = ansLabel.slice(0,28) + '…';
      }
      return `<div class="wiz-step ${active?'active':''} ${done?'done':''}" onclick="jumpToStep(${i})">
        <div class="step-num">${i+1}</div>
        <div class="step-info">
          <div class="step-label">${q.text.slice(0,32)}${q.text.length>32?'…':''}</div>
          ${done ? `<div class="step-answer">${ansLabel}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    // track tab
    const applic = Object.keys(answers).length === QUESTIONS.length ? determineApplicableSections() : {};
    const applicSecs = SECTIONS.filter(s => applic[s.sec] && applic[s.sec].applies);
    if (!applicSecs.length) {
      body.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px;">Complete classification to see applicable sections.</div>';
      return;
    }
    body.innerHTML = applicSecs.map(s => {
      const t = tracking[s.sec] || {};
      const ryg = t.ryg || 'unset';
      const pct = t.pct || 0;
      return `<div class="track-item ${currentView==='results'?'':''}" onclick="navigateToSection('${s.sec}')">
        <div class="pip ${ryg}"></div>
        <div class="track-item-label">FMVSS ${s.sec} ${s.title}</div>
        <div class="track-item-pct">${pct}%</div>
      </div>`;
    }).join('');
  }
}

function jumpToStep(i) {
  currentWizardStep = i;
  showView('wizard');
}

function navigateToSection(sec) {
  showView('results');
  setTimeout(() => {
    const el = document.getElementById('sec-' + sec);
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('expanded'); renderSectionBody(sec); }
  }, 100);
}

// ══════════════════════════════════════════════════════════
//  WIZARD
// ══════════════════════════════════════════════════════════
function renderWizard() {
  const q = QUESTIONS[currentWizardStep];
  const ans = answers[q.id];
  const pct = Math.round(((currentWizardStep) / QUESTIONS.length) * 100);
  document.getElementById('topbar-sub').textContent = `Classification — Step ${currentWizardStep+1} of ${QUESTIONS.length}`;

  document.getElementById('view-wizard').innerHTML = `
    <div class="wizard-progress"><div class="wizard-progress-fill" style="width:${pct}%"></div></div>
    <div class="wizard-card">
      <div class="wizard-q-label">Question ${currentWizardStep+1} of ${QUESTIONS.length} — ${q.id}</div>
      <div class="wizard-q-text">${q.text}</div>
      <div class="options-grid">
        ${q.options.map(o => {
          const sel = q.multi ? (Array.isArray(ans) && ans.includes(o.val)) : (ans === o.val);
          return `<button class="opt-btn ${q.multi ? (sel?'multi-selected':'') : (sel?'selected':'')}" onclick="selectOption('${q.id}','${o.val}',${q.multi})">
            <div class="${q.multi ? 'opt-check' : 'opt-radio'}"></div>
            <div>
              <div class="opt-label">${o.label}</div>
              ${o.desc ? `<div class="opt-desc">${o.desc}</div>` : ''}
            </div>
          </button>`;
        }).join('')}
      </div>
      <div class="wizard-nav">
        ${currentWizardStep > 0 ? '<button class="btn-back" onclick="wizardBack()">← Back</button>' : ''}
        <button class="btn-next" onclick="wizardNext()" ${!hasAnswer(q.id)?'disabled':''}>
          ${currentWizardStep === QUESTIONS.length-1 ? 'Finish →' : 'Next →'}
        </button>
      </div>
    </div>
  `;
}

function hasAnswer(id) {
  const q = QUESTIONS.find(q=>q.id===id);
  const a = answers[id];
  if (!a) return false;
  if (Array.isArray(a)) return a.length > 0;
  return true;
}

function selectOption(id, val, multi) {
  if (multi) {
    let arr = Array.isArray(answers[id]) ? [...answers[id]] : [];
    if (arr.includes(val)) arr = arr.filter(v=>v!==val);
    else arr.push(val);
    answers[id] = arr;
  } else {
    answers[id] = val;
  }
  scheduleSave();
  renderWizard();
  renderSidebar();
}

function wizardNext() {
  if (!hasAnswer(QUESTIONS[currentWizardStep].id)) return;
  if (currentWizardStep < QUESTIONS.length - 1) {
    currentWizardStep++;
    renderWizard();
    renderSidebar();
  } else {
    saveData();
    showView('results');
  }
}

function wizardBack() {
  if (currentWizardStep > 0) { currentWizardStep--; renderWizard(); renderSidebar(); }
}

function resetWizard() {
  if (!confirm('Reset classification answers? Tracking data will be preserved.')) return;
  answers = {};
  currentWizardStep = 0;
  scheduleSave();
  showView('wizard');
}

// ══════════════════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════════════════
function renderResults() {
  const applic = determineApplicableSections();
  const applicSecs = SECTIONS.filter(s => applic[s.sec] && applic[s.sec].applies);

  // count by series
  const counts = {100:0,200:0,300:0,400:0,cert:0};
  applicSecs.forEach(s => {
    if (s.series === 567 || s.series === 568) counts.cert++;
    else if (s.series >= 400) counts['400']++;
    else counts[String(Math.floor(s.series/100)*100)] = (counts[String(Math.floor(s.series/100)*100)]||0) + 1;
  });

  const summaryHTML = `
    <div class="results-summary">
      <div class="sum-stat"><span class="sum-badge badge-100">${counts['100']||0} × 100s</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat"><span class="sum-badge badge-200">${counts['200']||0} × 200s</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat"><span class="sum-badge badge-300">${counts['300']||0} × 300s</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat"><span class="sum-badge badge-400">${counts['400']||0} × 400s</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat"><span class="sum-badge badge-cert">${counts.cert||0} Cert</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat" style="color:var(--text2);font-size:12px;"><strong>${applicSecs.length}</strong>&nbsp;applicable standards</div>
      <div class="project-end-wrap">
        <label>Project end:</label>
        <input type="date" value="${projectEnd}" onchange="projectEnd=this.value;scheduleSave()">
      </div>
    </div>`;

  const filterHTML = `
    <div class="filter-bar">
      <span class="filter-label">Status:</span>
      ${['all','green','yellow','red','unset'].map(f=>`<button class="filter-chip ${filterRYG===f?'active':''}" onclick="setFilter('ryg','${f}')">${f==='all'?'All':f==='green'?'On Schedule':f==='yellow'?'Needs Attention':f==='red'?'Attention Needed':'Unset'}</button>`).join('')}
      <span class="filter-label" style="margin-left:12px;">Part:</span>
      ${['all','100','200','300','400','cert'].map(f=>`<button class="filter-chip ${filterPart===f?'active':''}" onclick="setFilter('part','${f}')">${f==='all'?'All':f==='cert'?'Cert (567/568)':f+'s'}</button>`).join('')}
    </div>`;

  // Group sections
  const groups = [
    { key:'100', label:'100-Series — Crash Avoidance', cls:'gh-100', secs: SECTIONS.filter(s=>s.series>=100&&s.series<200) },
    { key:'200', label:'200-Series — Crashworthiness', cls:'gh-200', secs: SECTIONS.filter(s=>s.series>=200&&s.series<300) },
    { key:'300', label:'300-Series — Post-Crash', cls:'gh-300', secs: SECTIONS.filter(s=>s.series>=300&&s.series<400) },
    { key:'400', label:'400-Series — Miscellaneous', cls:'gh-400', secs: SECTIONS.filter(s=>s.series>=400&&s.series<500) },
    { key:'cert', label:'Certification — Parts 567 & 568', cls:'gh-cert', secs: SECTIONS.filter(s=>s.series===567||s.series===568) },
  ];

  let groupsHTML = '';
  for (const g of groups) {
    const visibleSecs = g.secs.filter(s => {
      const t = tracking[s.sec] || {};
      const ryg = t.ryg || 'unset';
      if (filterPart !== 'all' && filterPart !== g.key) return false;
      if (filterRYG !== 'all' && filterRYG !== ryg) return false;
      return true;
    });
    if (!visibleSecs.length && filterPart !== 'all') continue;
    const appl = g.secs.filter(s=>applic[s.sec]&&applic[s.sec].applies).length;
    const avgPct = appl ? Math.round(g.secs.filter(s=>applic[s.sec]&&applic[s.sec].applies).reduce((a,s)=>(a+(tracking[s.sec]?.pct||0)),0)/appl) : 0;

    groupsHTML += `
      <div class="section-group">
        <div class="group-header ${g.cls}" onclick="toggleGroup(this)">
          <span class="group-chevron">▼</span>
          <span class="group-title">${g.label}</span>
          <span class="group-count">${appl} applicable</span>
          <span class="group-pct">${avgPct}% avg</span>
        </div>
        <div class="group-body">
          ${visibleSecs.map(s => renderSectionCard(s, applic[s.sec])).join('')}
        </div>
      </div>`;
  }

  document.getElementById('view-results').innerHTML = summaryHTML + filterHTML + groupsHTML;
}

function renderSectionCard(s, appl) {
  const t = tracking[s.sec] || {};
  const ryg = t.ryg || 'unset';
  const pct = t.pct || 0;
  const isAppl = appl && appl.applies;
  const badges = [];
  if (s.mandatory) badges.push('<span class="qbadge qbadge-mand" title="Mandatory standard">Mandatory</span>');
  if (s.tests && s.tests.length) badges.push('<span class="qbadge qbadge-test" title="Test procedure required">Test</span>');
  if (s.forms && s.forms.length) badges.push('<span class="qbadge qbadge-form" title="Form/label required">Form</span>');
  if (s.vehDocs && s.vehDocs.length) badges.push('<span class="qbadge qbadge-doc" title="Documentation needed">Docs</span>');
  if (s.criteria && s.criteria.length) badges.push('<span class="qbadge qbadge-crit" title="Atomic acceptance criteria">Criteria</span>');
  const badgesHtml = isAppl && badges.length ? ('<span class="qbadges">' + badges.join('') + '</span>') : '';
  return `
    <div class="section-card" id="sec-${s.sec}" onclick="toggleSection('${s.sec}',event)">
      <div class="section-card-header">
        <div class="sec-pips"><div class="pip-dot ${ryg==='green'?'green':ryg==='yellow'?'yellow':ryg==='red'?'red':''}"></div></div>
        <div class="sec-num">FMVSS ${s.sec}</div>
        <div class="sec-title">${s.title}</div>
        ${badgesHtml}
        ${!isAppl ? `<span class="sec-na-badge">N/A</span>` : `<span class="sec-pct-badge">${pct}%</span>`}
        <span class="sec-chevron">▶</span>
      </div>
      <div class="section-body" id="body-${s.sec}"></div>
    </div>`;
}

function toggleSection(sec, evt) {
  // Only respond if the click originated in the section card header (not inside body).
  // We check evt.target.closest('.section-card-header') which is stable even if body content
  // was re-rendered by other handlers running first.
  if (!evt || !evt.target.closest('.section-card-header')) return;
  const card = document.getElementById('sec-' + sec);
  if (!card) return;
  const isExp = card.classList.contains('expanded');
  card.classList.toggle('expanded', !isExp);
  if (!isExp) renderSectionBody(sec);
}

function toggleGroup(header) {
  header.classList.toggle('collapsed');
  const body = header.nextElementSibling;
  if (body) body.style.display = header.classList.contains('collapsed') ? 'none' : '';
}


function renderMTFPanel(s) {
  const tests = s.tests || [];
  const forms = s.forms || [];
  const vdocs = s.vehDocs || [];
  if (!tests.length && !forms.length && !vdocs.length) return '';
  const section = function(cls, label, items) {
    if (!items.length) {
      return '<div class="mtf-group ' + cls + '">'
        + '<div class="mtf-group-label"><span class="mtf-group-label-dot"></span>' + label + '</div>'
        + '<div class="mtf-empty">None specified</div>'
        + '</div>';
    }
    return '<div class="mtf-group ' + cls + '">'
      + '<div class="mtf-group-label"><span class="mtf-group-label-dot"></span>' + label + ' (' + items.length + ')</div>'
      + '<ul class="mtf-list">' + items.map(function(i) { return '<li>' + i + '</li>'; }).join('') + '</ul>'
      + '</div>';
  };
  let out = '<div class="mtf-panel"><div class="mtf-panel-title">Mandated Tests & Forms</div>';
  if (tests.length) out += section('mtf-group-tests', 'Required tests / procedures', tests);
  if (forms.length) out += section('mtf-group-forms', 'Required forms / labels', forms);
  if (vdocs.length) out += section('mtf-group-docs',  'Vehicle-specific documentation', vdocs);
  out += '</div>';
  return out;
}

function renderSectionBody(sec) {
  const s = SECTIONS.find(x=>x.sec===sec);
  if (!s) return;
  const applic = determineApplicableSections();
  const appl = applic[sec] || { applies: false, note: '' };
  ensureTracking(sec);
  const t = tracking[sec];

  const bodyEl = document.getElementById('body-' + sec);
  if (!bodyEl) return;

  const tags = (s.summary.tags||[]).map(tag => {
    const cls = tag.includes('Crash Avoidance')||tag.includes('Brakes')||tag.includes('Light Vehicle')?'tag-blue':
                tag.includes('Crash')||tag.includes('Ejection')?'tag-red':
                tag.includes('Post')||tag.includes('Fuel')||tag.includes('Fire')?'tag-amber':
                tag.includes('EV')||tag.includes('Hybrid')||tag.includes('LSV')?'tag-teal':
                tag.includes('Cert')||tag.includes('Stage')?'tag-indigo':'tag-grey';
    return `<span class="tag ${cls}">${tag}</span>`;
  }).join('');

  bodyEl.innerHTML = `
    <div class="reg-panel">
      <div class="apply-note ${appl.applies?'applies':'na'}">${appl.applies?'✓ Applicable':'✗ Not Applicable'}: ${appl.note}</div>
      <div class="reg-summary">
        <div class="reg-field"><div class="reg-field-label">What</div><div class="reg-field-val">${s.summary.what}</div></div>
        <div class="reg-field"><div class="reg-field-label">Who</div><div class="reg-field-val">${s.summary.who}</div></div>
        <div class="reg-field"><div class="reg-field-label">When</div><div class="reg-field-val">${s.summary.when}</div></div>
        <div class="reg-field"><div class="reg-field-label">Why it matters</div><div class="reg-field-val">${s.summary.why}</div></div>
      </div>
      <div class="tags-row">${tags}</div>
      ${s.conditions.length ? `<div class="small-section-head">Applicability Conditions</div>
        <ul class="cond-list">${s.conditions.map(c=>`<li>${c}</li>`).join('')}</ul>` : ''}
      <a class="ecfr-link" href="${s.ecfr}" target="_blank">↗ View on eCFR</a>
      ${renderMTFPanel(s)}
      ${s.subs && s.subs.length ? ('<div class="subsec-list"><div class="subsec-list-title"><span>Sub-sections (' + s.subs.length + ')</span><button class="subsec-clear-btn" onclick="clearSubChecks(\'' + sec + '\');event.stopPropagation()">Clear all</button></div><div id="subsec-list-' + sec + '">' + renderSubsecList(sec) + '</div></div>') : ''}
    </div>
    <div class="track-panel" id="track-${sec}">
      <div class="ryg-row">
        <button class="ryg-btn ${t.ryg==='green'?'green-active':''}" onclick="setRYG('${sec}','green')">🟢 On Schedule</button>
        <button class="ryg-btn ${t.ryg==='yellow'?'yellow-active':''}" onclick="setRYG('${sec}','yellow')">🟡 Needs Attention</button>
        <button class="ryg-btn ${t.ryg==='red'?'red-active':''}" onclick="setRYG('${sec}','red')">🔴 Attention Needed</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Owner</label><input class="form-input userlist-autocomplete" list="userlist-datalist" id="own-${sec}" value="${t.owner||''}" oninput="updateField('${sec}','owner',this.value)"></div>
        <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-input" id="start-${sec}" value="${t.startdate||''}" oninput="updateField('${sec}','startdate',this.value)"></div>
        <div class="form-group"><label class="form-label">Due Date</label><input type="date" class="form-input" id="due-${sec}" value="${t.duedate||''}" oninput="updateField('${sec}','duedate',this.value)"></div>
      </div>
      <div class="pct-row">
        <label class="form-label" style="min-width:80px;margin:0">% Complete</label>
        <input type="range" min="0" max="100" value="${t.pct||0}" oninput="updateField('${sec}','pct',parseInt(this.value));document.getElementById('pct-val-${sec}').textContent=this.value+'%'">
        <span class="pct-val" id="pct-val-${sec}">${t.pct||0}%</span>

function filterSubs(subs) {
  const a = answers || {};
  if (!Array.isArray(subs)) return [];
  const isMotorcycle = a.vtype === 'motorcycle';
  const isTrailer = a.vtype === 'trailer';
  const isBus = a.vtype === 'bus';
  const isSchoolBus = Array.isArray(a.use) && a.use.includes('school_bus');
  const isMotorHome = Array.isArray(a.use) && a.use.includes('motor_home');
  const isCNG = a.propulsion === 'cng';
  const isHydrogen = a.propulsion === 'hydrogen';
  const isHybrid = a.propulsion === 'hybrid';
  const isEV = a.propulsion === 'ev';
  const isHeavy = a.gvwr === 'heavy';
  const isLSV = a.vtype === 'lsv';
  const isPre2000 = a.dom === 'pre2000';
  const is2018plus = a.dom === '2018to2024' || a.dom === 'post2024';

  return subs.filter(function(sub) {
    const s = sub.toLowerCase();
    // Combined references (e.g. "motor home/trailer") — apply if either matches
    if (/motor home\/(trailer|recreation)/.test(s)) return isTrailer || isMotorHome;
    // Vehicle type specific references
    if (/\bmotorcycle\b/.test(s)) return isMotorcycle;
    if (/\btrailer\b/.test(s) && !/trailer load carrying/.test(s)) return isTrailer;
    if (/\bschool bus\b/.test(s)) return isSchoolBus;
    if (/\bmotor home\b/.test(s)) return isMotorHome;
    // Propulsion specific references
    if (/\bcng\b|\blng\b|compressed natural gas|liquefied natural gas|gaseous fuel/.test(s)) return isCNG;
    if (/\bhydrogen\b|\bfcev\b/.test(s)) return isHydrogen;
    // Heavy-vehicle only subs
    if (/\bair brake\b/.test(s)) return isHeavy;
    // Historical: Option 1 seatbelt only (pre-1998) — hide for modern vehicles
    if (/option 1.+seat belt only/.test(s) && !isPre2000) return false;
    return true;
  });
}

function ensureDeliverables(sec) {
  ensureTracking(sec);
  const section = SECTIONS.find(x => x.sec === sec);
  if (!section || !section.deliverables) return;
  const delivs = tracking[sec].deliverables;
  while (delivs.length < section.deliverables.length) {
    delivs.push({ done: false, assignee: '', startdate: '', duedate: '' });
  }
}

function renderDeliverables(sec) {
  const s = SECTIONS.find(x => x.sec === sec);
  if (!s || !s.deliverables || !s.deliverables.length) return '';
  ensureDeliverables(sec);
  const delivs = tracking[sec].deliverables;
  const total = s.deliverables.length;
  const done = delivs.filter(function(d) { return d && d.done; }).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  let out = '<div class="deliv-progress-row">'
    + '<div class="subsec-progress-bar-bg"><div class="subsec-progress-bar-fill" style="width:' + pct + '%"></div></div>'
    + '<span class="subsec-progress-label">' + done + '/' + total + '</span>'
    + '</div>';
  out += '<div class="deliv-header-row"><span></span><span>Deliverable</span><span>Assignee</span><span>Start</span><span>Due</span></div>';
  s.deliverables.forEach(function(dt, i) {
    const d = delivs[i] || { done: false, assignee: '', startdate: '', duedate: '' };
    out += '<div class="deliv-item">'
      + '<input type="checkbox" ' + (d.done ? 'checked' : '') + ' onchange="toggleDeliv(\'' + sec + '\',' + i + ',this.checked)">'
      + '<span class="deliv-text ' + (d.done ? 'done' : '') + '">' + dt + '</span>'
      + '<input list="userlist-datalist" class="sub-input userlist-autocomplete" value="' + (d.assignee || '') + '" placeholder="Assignee" oninput="updateDeliv(\'' + sec + '\',' + i + ',\'assignee\',this.value)">'
      + '<input type="date" class="sub-input" value="' + (d.startdate || '') + '" oninput="updateDeliv(\'' + sec + '\',' + i + ',\'startdate\',this.value)">'
      + '<input type="date" class="sub-input" value="' + (d.duedate || '') + '" oninput="updateDeliv(\'' + sec + '\',' + i + ',\'duedate\',this.value)">'
      + '</div>';
  });
  return out;
}

function renderSubsecList(sec) {
  const s = SECTIONS.find(x => x.sec === sec);
  if (!s || !s.subs || !s.subs.length) return '';
  ensureTracking(sec);
  const filtered = filterSubs(s.subs);
  if (!filtered.length) return '<div style="font-size:11px;color:var(--text3);padding:4px 0">No applicable sub-sections for selected vehicle configuration.</div>';
  const checks = tracking[sec].subChecks || {};
  const total = filtered.length;
  const done = filtered.filter(function(sub) { return !!checks[sub]; }).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  let out = '<div class="subsec-progress-row">'
    + '<div class="subsec-progress-bar-bg"><div class="subsec-progress-bar-fill" style="width:' + pct + '%"></div></div>'
    + '<span class="subsec-progress-label">' + done + '/' + total + '</span>'
    + '</div>';
  filtered.forEach(function(sub) {
    const chk = !!checks[sub];
    const subEsc = sub.replace(/'/g, "\\'");
    out += '<div class="subsec-item ' + (chk ? 'checked' : '') + '" onclick="toggleSubCheck(\'' + sec + '\',\'' + subEsc + '\')">'
      + '<input type="checkbox" ' + (chk ? 'checked' : '') + ' onclick="event.stopPropagation();toggleSubCheck(\'' + sec + '\',\'' + subEsc + '\')">'
      + '<label>' + sub + '</label>'
      + '</div>';
  });
  return out;
}

function ensureTracking(sec) {
  if (!tracking[sec]) tracking[sec] = { ryg:'unset', owner:'', startdate:'', duedate:'', pct:0, notes:'', docs:[], subtasks:[], deliverables:[], subChecks:{} };
  const t = tracking[sec];
  // Migration from old field names
  if (t.due !== undefined && t.duedate === undefined) { t.duedate = t.due; }
  if (t.enddate !== undefined && t.startdate === undefined) { t.startdate = t.enddate; }
  if (t.startdate === undefined) t.startdate = '';
  if (t.duedate === undefined) t.duedate = '';
  if (!t.subChecks) t.subChecks = {};
  if (!t.deliverables) t.deliverables = [];
  if (!t.subtasks) t.subtasks = [];
  if (!t.docs) t.docs = [];
  // Migrate subtask enddate -> duedate
  t.subtasks.forEach(st => {
    if (st.enddate !== undefined && st.duedate === undefined) st.duedate = st.enddate;
    if (st.startdate === undefined) st.startdate = '';
    if (st.duedate === undefined) st.duedate = '';
  });
  // Sync deliverables array length with section data
  const section = SECTIONS.find(x => x.sec === sec);
  if (section && section.deliverables) {
    while (t.deliverables.length < section.deliverables.length) {
      t.deliverables.push({ done: false, assignee: '', startdate: '', duedate: '' });
    }
  }
  // Migrate subChecks from index-based to text-based keys
  if (section && section.subs) {
    const keys = Object.keys(t.subChecks);
    if (keys.length && /^\d+$/.test(keys[0])) {
      const newChecks = {};
      keys.forEach(k => {
        const idx = parseInt(k);
        if (section.subs[idx]) newChecks[section.subs[idx]] = t.subChecks[k];
      });
      t.subChecks = newChecks;
    }
  }
}

//  ACCEPTANCE CRITERIA
// ══════════════════════════════════════════════════════════
function ensureCriteria(sec) {
  ensureTracking(sec);
  if (!tracking[sec].criteria) tracking[sec].criteria = {};
}

function filterCriteria(crits) {
  // Same configuration filter pattern as filterSubs.
  if (!Array.isArray(crits)) return [];
  const a = answers || {};
  const isMotorcycle = a.vtype === 'motorcycle';
  const isTrailer = a.vtype === 'trailer';
  const isSchoolBus = Array.isArray(a.use) && a.use.includes('school_bus');
  const isMotorHome = Array.isArray(a.use) && a.use.includes('motor_home');
  const isCNG = a.propulsion === 'cng';
  const isHydrogen = a.propulsion === 'hydrogen';
  const isEV = a.propulsion === 'ev' || a.propulsion === 'hybrid';
  const isHeavy = a.gvwr === 'heavy';

  return crits.filter(function(c) {
    if (!c.tag) return true;
    switch(c.tag) {
      case 'motorcycle': return isMotorcycle;
      case 'trailer': return isTrailer;
      case 'school_bus': return isSchoolBus;
      case 'motor_home': return isMotorHome;
      case 'cng': return isCNG;
      case 'hydrogen': return isHydrogen;
      case 'ev': return isEV;
      case 'air_brake': return isHeavy;
      default: return true;
    }
  });
}

function _critStateClass(state) {
  return ({pass:'crit-pass', fail:'crit-fail', prog:'crit-prog', na:'crit-na'})[state] || '';
}

function _critProgressColor(stats) {
  if (stats.fail > 0) return 'red';
  if (stats.prog > 0 || stats.unset > 0) return 'yellow';
  if (stats.pass > 0) return 'green';
  return 'yellow';
}

function _critStats(crits, secKey) {
  const st = (tracking[secKey] || {}).criteria || {};
  let pass = 0, fail = 0, prog = 0, na = 0, unset = 0;
  crits.forEach(function(c) {
    const v = (st[c.id] || {}).state;
    if (v === 'pass') pass++;
    else if (v === 'fail') fail++;
    else if (v === 'prog') prog++;
    else if (v === 'na') na++;
    else unset++;
  });
  const total = crits.length;
  const evaluated = pass + fail + na;
  const pctPass = total ? Math.round(pass / total * 100) : 0;
  return {pass, fail, prog, na, unset, total, evaluated, pctPass};
}

function _suggestRYG(stats) {
  // Auto-rollup logic per spec
  if (stats.fail > 0) return 'red';
  if (stats.prog > 0) return 'yellow';
  // Treat NA as "doesn't count" — only judge by pass vs unset of evaluable
  const evaluable = stats.total - stats.na;
  if (evaluable === 0) return null;  // all N/A → no suggestion
  if (stats.pass === evaluable) return 'green';
  if (stats.unset > 0 && stats.pass > 0) return 'yellow';
  if (stats.unset === evaluable) return null;  // nothing started yet
  return 'yellow';
}


// Render a single criterion item (extracted so it can be updated surgically without full re-render).
function renderCritItem(sec, c, st) {
  const state = (st && st.state) || 'unset';
  const stateClass = _critStateClass(state);
  const cidEsc = c.id.replace(/'/g, "\\'");
  const safeId = 'crit-item-' + sec + '-' + c.id.replace(/[^a-zA-Z0-9_-]/g, '_');
  st = st || {};

  let out = '<div class="crit-item ' + stateClass + '" id="' + safeId + '">';
  out += '<div class="crit-item-row1">';
  out += '<div class="crit-id-ref">' + c.id + '<br>' + (c.ref || '') + '</div>';
  out += '<div class="crit-text">' + c.text + '</div>';
  out += '</div>';
  out += '<div class="crit-state-row">';
  [['pass','Pass'], ['fail','Fail'], ['prog','In Progress'], ['na','N/A']].forEach(function(b) {
    const active = state === b[0] ? 'crit-active-' + b[0] : '';
    out += '<button class="crit-state-btn ' + active + '" onclick="setCritState(\'' + sec + '\',\'' + cidEsc + '\',\'' + b[0] + '\')">' + b[1] + '</button>';
  });
  out += '</div>';
  out += '<div class="crit-meta-row">';
  out += '<input class="crit-meta-input userlist-autocomplete" list="userlist-datalist" placeholder="Tester / Engineer" value="' + (st.tester || '') + '" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'tester\',this.value)">';
  out += '<input type="date" class="crit-meta-input" value="' + (st.date || '') + '" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'date\',this.value)">';
  out += '<input class="crit-meta-input userlist-autocomplete" list="userlist-datalist" placeholder="Assignee" value="' + (st.assignee || '') + '" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'assignee\',this.value)">';
  out += '</div>';
  out += '<input class="crit-evidence-input" placeholder="Evidence: file path / report ID / link" value="' + (st.evidence || '') + '" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'evidence\',this.value)">';
  out += '<textarea class="crit-note-input" placeholder="Note / observation" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'note\',this.value)">' + (st.note || '') + '</textarea>';
  out += '</div>';
  return out;
}

// Update the stats strip + progress bar + rollup banner surgically.
function _refreshCritStats(sec) {
  const s = SECTIONS.find(x => x.sec === sec);
  if (!s || !s.criteria) return;
  const filtered = filterCriteria(s.criteria);
  const stats = _critStats(filtered, sec);
  // Progress bar fill
  const progFill = document.querySelector('#sec-' + sec + ' .crit-progress-bar-fill');
  if (progFill) {
    progFill.className = 'crit-progress-bar-fill ' + _critProgressColor(stats);
    progFill.style.width = stats.pctPass + '%';
  }
  const progLabel = document.querySelector('#sec-' + sec + ' .crit-progress-label');
  if (progLabel) progLabel.textContent = stats.pass + '/' + stats.total + ' pass';
  // Stats strip
  const statsEl = document.querySelector('#sec-' + sec + ' .crit-stats');
  if (statsEl) {
    let html = '';
    if (stats.pass) html += '<span class="crit-stat pass-stat"><span class="crit-stat-dot"></span>' + stats.pass + ' pass</span>';
    if (stats.fail) html += '<span class="crit-stat fail-stat"><span class="crit-stat-dot"></span>' + stats.fail + ' fail</span>';
    if (stats.prog) html += '<span class="crit-stat prog-stat"><span class="crit-stat-dot"></span>' + stats.prog + ' in progress</span>';
    if (stats.na)   html += '<span class="crit-stat na-stat"><span class="crit-stat-dot"></span>' + stats.na + ' N/A</span>';
    if (stats.unset) html += '<span class="crit-stat unset-stat"><span class="crit-stat-dot"></span>' + stats.unset + ' unset</span>';
    statsEl.innerHTML = html;
  }
  // Rollup banner — find or create
  const rygSuggestion = _suggestRYG(stats);
  const currentRyg = (tracking[sec] || {}).ryg || 'unset';
  const showRollup = rygSuggestion && rygSuggestion !== currentRyg;
  const critSection = document.querySelector('#sec-' + sec + ' .crit-section');
  if (critSection) {
    const existing = critSection.querySelector('.crit-rollup-suggest');
    if (showRollup) {
      const labels = {green:'On Schedule', yellow:'Needs Attention', red:'Attention Needed'};
      const bannerHTML = '<div class="crit-rollup-suggest"><span class="crit-rollup-text">Criteria pattern suggests <strong>' + labels[rygSuggestion] + '</strong>. Current: ' + (currentRyg === 'unset' ? 'unset' : labels[currentRyg]) + '.</span><button onclick="setRYG(\'' + sec + '\',\'' + rygSuggestion + '\');_refreshCritStats(\'' + sec + '\');_refreshRYGButtons(\'' + sec + '\')">Apply</button></div>';
      if (existing) existing.outerHTML = bannerHTML;
      else critSection.insertAdjacentHTML('beforeend', bannerHTML);
    } else if (existing) {
      existing.remove();
    }
  }
}

function _refreshRYGButtons(sec) {
  const ryg = (tracking[sec] || {}).ryg || 'unset';
  ['green','yellow','red'].forEach(function(c) {
    const btn = document.querySelector('#sec-' + sec + ' .ryg-btn.btn-' + c);
    if (btn) btn.classList.toggle(c + '-active', ryg === c);
  });
  // Also update the pip dot in the card header
  const pip = document.querySelector('#sec-' + sec + ' > .section-card-header .pip-dot');
  if (pip) pip.className = 'pip-dot ' + (ryg === 'green' ? 'green' : ryg === 'yellow' ? 'yellow' : ryg === 'red' ? 'red' : '');
}

function renderCriteria(sec) {
  const s = SECTIONS.find(x => x.sec === sec);
  if (!s || !Array.isArray(s.criteria) || !s.criteria.length) return '';
  ensureCriteria(sec);

  const filtered = filterCriteria(s.criteria);
  if (!filtered.length) {
    return '<div class="crit-section"><div class="crit-section-header"><span class="crit-section-title">Acceptance Criteria</span></div><div class="crit-empty">No applicable acceptance criteria for selected vehicle configuration.</div></div>';
  }

  const stats = _critStats(filtered, sec);
  const rygSuggestion = _suggestRYG(stats);
  const currentRyg = (tracking[sec] || {}).ryg || 'unset';
  const showRollup = rygSuggestion && rygSuggestion !== currentRyg;

  let out = '<div class="crit-section">';
  out += '<div class="crit-section-header"><span class="crit-section-title">Acceptance Criteria (' + filtered.length + ')</span></div>';

  // Progress bar
  const progColor = _critProgressColor(stats);
  out += '<div class="crit-progress-row">';
  out += '<div class="crit-progress-bar-bg"><div class="crit-progress-bar-fill ' + progColor + '" style="width:' + stats.pctPass + '%"></div></div>';
  out += '<span class="crit-progress-label">' + stats.pass + '/' + stats.total + ' pass</span>';
  out += '</div>';

  // Stats strip
  out += '<div class="crit-stats">';
  if (stats.pass) out += '<span class="crit-stat pass-stat"><span class="crit-stat-dot"></span>' + stats.pass + ' pass</span>';
  if (stats.fail) out += '<span class="crit-stat fail-stat"><span class="crit-stat-dot"></span>' + stats.fail + ' fail</span>';
  if (stats.prog) out += '<span class="crit-stat prog-stat"><span class="crit-stat-dot"></span>' + stats.prog + ' in progress</span>';
  if (stats.na)   out += '<span class="crit-stat na-stat"><span class="crit-stat-dot"></span>' + stats.na + ' N/A</span>';
  if (stats.unset) out += '<span class="crit-stat unset-stat"><span class="crit-stat-dot"></span>' + stats.unset + ' unset</span>';
  out += '</div>';

  // Items
  const stMap = (tracking[sec] || {}).criteria || {};
  filtered.forEach(function(c) {
    const st = stMap[c.id] || {};
    const state = st.state || 'unset';
    const stateClass = _critStateClass(state);
    const cidEsc = c.id.replace(/'/g, "\\'");

    out += renderCritItem(sec, c, st);
  });

  // Rollup suggestion banner
  if (showRollup) {
    out += '<div class="crit-rollup-suggest">';
    out += '<span class="crit-rollup-text">Criteria pattern suggests <strong>' + ({green:'On Schedule',yellow:'Needs Attention',red:'Attention Needed'})[rygSuggestion] + '</strong>. Current: ' + (currentRyg === 'unset' ? 'unset' : ({green:'On Schedule',yellow:'Needs Attention',red:'Attention Needed'})[currentRyg]) + '.</span>';
    out += '<button onclick="event.stopPropagation();setRYG(\'' + sec + '\',\'' + rygSuggestion + '\');_refreshCritStats(\'' + sec + '\');_refreshRYGButtons(\'' + sec + '\')">Apply</button>';
    out += '</div>';
  }

  out += '</div>';
  return out;
}

function setCritState(sec, cid, state) {
  ensureCriteria(sec);
  if (!tracking[sec].criteria[cid]) tracking[sec].criteria[cid] = {};
  // Toggle: clicking same state clears it
  if (tracking[sec].criteria[cid].state === state) {
    delete tracking[sec].criteria[cid].state;
  } else {
    tracking[sec].criteria[cid].state = state;
  }
  scheduleSave();
  // Surgical update — just this criterion's item and the section stats
  const card = document.getElementById('sec-' + sec);
  if (!card || !card.classList.contains('expanded')) return;
  // Capture scroll position as a safety net in case the DOM swap perturbs it
  const scrollContainer = document.getElementById('content') || document.scrollingElement;
  const savedScroll = scrollContainer ? scrollContainer.scrollTop : 0;
  const safeId = 'crit-item-' + sec + '-' + cid.replace(/[^a-zA-Z0-9_-]/g, '_');
  const itemEl = document.getElementById(safeId);
  if (itemEl) {
    const s = SECTIONS.find(x => x.sec === sec);
    const c = s.criteria.find(x => x.id === cid);
    const st = tracking[sec].criteria[cid] || {};
    itemEl.outerHTML = renderCritItem(sec, c, st);
  }
  _refreshCritStats(sec);
  // Restore scroll if it shifted
  if (scrollContainer && scrollContainer.scrollTop !== savedScroll) {
    scrollContainer.scrollTop = savedScroll;
  }
}

function updateCritField(sec, cid, field, val) {
  ensureCriteria(sec);
  if (!tracking[sec].criteria[cid]) tracking[sec].criteria[cid] = {};
  tracking[sec].criteria[cid][field] = val;
  scheduleSave();
}

function _computeInitials(name) {
  if (!name) return '—';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

function _uniqueUserId() {
  let n = 1;
  while (users.find(u => u.id === 'user-' + n)) n++;
  return 'user-' + n;
}

function addUser(name, role) {
  const trimmedName = (name || '').trim();
  if (!trimmedName) return false;
  const u = {
    id: _uniqueUserId(),
    name: trimmedName,
    role: (role || '').trim(),
    initials: _computeInitials(trimmedName)
  };
  users.push(u);
  scheduleSave();
  renderUserDatalist();
  return true;
}

function deleteUser(uid) {
  if (!confirm('Delete this user? Existing assignments referring to their name will remain as text but no longer auto-suggest.')) return;
  users = users.filter(u => u.id !== uid);
  scheduleSave();
  renderUsersView();
  renderUserDatalist();
}

function updateUserField(uid, field, val) {
  const u = users.find(x => x.id === uid);
  if (!u) return;
  u[field] = val;
  // Recompute initials if name changed AND initials looked auto-generated
  if (field === 'name' && (!u.initialsManual || u.initials === _computeInitials(u._prevName || ''))) {
    u.initials = _computeInitials(val);
  }
  if (field === 'initials') {
    u.initialsManual = true;
  }
  u._prevName = u.name;
  scheduleSave();
  renderUserDatalist();
  // Refresh the avatar for this row (surgical)
  const avatarEl = document.querySelector('[data-user-avatar="' + uid + '"]');
  if (avatarEl) avatarEl.textContent = u.initials;
}

function _migrateLegacyAssignees() {
  // Collect every unique non-empty assignee string from existing tracking data
  const found = new Set();
  Object.keys(tracking).forEach(sec => {
    const t = tracking[sec];
    if (t.owner && t.owner.trim()) found.add(t.owner.trim());
    (t.deliverables || []).forEach(d => { if (d && d.assignee && d.assignee.trim()) found.add(d.assignee.trim()); });
    (t.subtasks || []).forEach(s => { if (s && s.assignee && s.assignee.trim()) found.add(s.assignee.trim()); });
    if (t.criteria) {
      Object.values(t.criteria).forEach(c => {
        if (c.assignee && c.assignee.trim()) found.add(c.assignee.trim());
        if (c.tester && c.tester.trim()) found.add(c.tester.trim());
      });
    }
  });
  if (!found.size) return;
  found.forEach(name => addUser(name, ''));
  console.log('Migrated ' + found.size + ' legacy assignees to user list.');
}

function renderUserDatalist() {
  const dl = document.getElementById('userlist-datalist');
  if (!dl) return;
  dl.innerHTML = users.map(u => {
    const label = u.role ? u.name + ' — ' + u.role : u.name;
    return '<option value="' + u.name.replace(/"/g, '&quot;') + '" label="' + label.replace(/"/g, '&quot;') + '">';
  }).join('');
}

function renderUsersView() {
  const view = document.getElementById('view-users');
  if (!view) return;
  const subEl = document.getElementById('topbar-sub');
  if (subEl) subEl.textContent = 'User directory';

  let html = '<div class="users-view-wrap">';
  html += '<h2>Users</h2>';
  html += '<div class="users-count-info">' + users.length + ' user' + (users.length === 1 ? '' : 's') + '. Names autocomplete in every assignee/owner field across the app.</div>';

  // Add row
  html += '<div class="users-add-row">';
  html += '<div><label>Name</label><input id="new-user-name" placeholder="Full name"></div>';
  html += '<div><label>Role</label><input id="new-user-role" placeholder="Compliance Engineer"></div>';
  html += '<div><label>Initials (auto)</label><input id="new-user-initials" placeholder="auto"></div>';
  html += '<button class="btn-add-user" onclick="(function(){var n=document.getElementById(\'new-user-name\').value;var r=document.getElementById(\'new-user-role\').value;var i=document.getElementById(\'new-user-initials\').value;if(addUser(n,r)){if(i&&i.trim()){var u=users[users.length-1];u.initials=i.trim().toUpperCase();u.initialsManual=true;scheduleSave();}document.getElementById(\'new-user-name\').value=\'\';document.getElementById(\'new-user-role\').value=\'\';document.getElementById(\'new-user-initials\').value=\'\';renderUsersView();renderUserDatalist();}})()">+ Add User</button>';
  html += '</div>';

  // Table
  if (!users.length) {
    html += '<div class="users-empty">No users yet. Add one above to get started.</div>';
  } else {
    html += '<table class="users-table"><thead><tr>';
    html += '<th style="width:50px"></th><th>Name</th><th>Role</th><th style="width:90px">Initials</th><th style="width:120px">Assignments</th><th style="width:60px"></th>';
    html += '</tr></thead><tbody>';
    users.forEach(u => {
      const assignCount = _countAssignmentsForUser(u.name);
      html += '<tr>';
      html += '<td><div class="user-avatar-tag" data-user-avatar="' + u.id + '">' + u.initials + '</div></td>';
      html += '<td><input value="' + (u.name || '').replace(/"/g, '&quot;') + '" oninput="updateUserField(\'' + u.id + '\',\'name\',this.value)"></td>';
      html += '<td><input value="' + (u.role || '').replace(/"/g, '&quot;') + '" oninput="updateUserField(\'' + u.id + '\',\'role\',this.value)" placeholder="(no role)"></td>';
      html += '<td><input value="' + (u.initials || '').replace(/"/g, '&quot;') + '" oninput="updateUserField(\'' + u.id + '\',\'initials\',this.value)" maxlength="3" style="text-align:center;font-family:var(--mono)"></td>';
      html += '<td style="font-family:var(--mono);font-size:12px;color:var(--text2)">' + assignCount + ' item' + (assignCount === 1 ? '' : 's') + '</td>';
      html += '<td><button class="btn-del-user" onclick="deleteUser(\'' + u.id + '\')">Delete</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';
  view.innerHTML = html;
  renderUserDatalist();
}

function _countAssignmentsForUser(name) {
  if (!name) return 0;
  let n = 0;
  Object.keys(tracking).forEach(sec => {
    const t = tracking[sec];
    if (t.owner === name) n++;
    (t.deliverables || []).forEach(d => { if (d && d.assignee === name) n++; });
    (t.subtasks || []).forEach(s => { if (s && s.assignee === name) n++; });
    if (t.criteria) {
      Object.values(t.criteria).forEach(c => {
        if (c.assignee === name) n++;
        if (c.tester === name) n++;
      });
    }
  });
  return n;
}
