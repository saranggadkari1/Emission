<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EPATrac v1.0 — EPA Emission Compliance</title>
<style>
/* ── Google Fonts ── */
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap');

/* ── CSS Variables ── */
:root {
  --bg: #0f1117;
  --bg2: #171b24;
  --bg3: #1e2433;
  --bg4: #252b3b;
  --border: #2d3448;
  --border2: #3d4560;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #c5303a;
  --accent2: #9d181d;

  /* series colours */
  --c100: #3b82f6;   /* 100-series crash avoidance — steel blue */
  --c100bg: rgba(59,130,246,0.08);
  --c200: #ef4444;   /* 200-series crashworthiness — coral/red */
  --c200bg: rgba(239,68,68,0.08);
  --c300: #f59e0b;   /* 300-series post-crash — amber */
  --c300bg: rgba(245,158,11,0.08);
  --c400: #14b8a6;   /* 400-series misc — teal */
  --c400bg: rgba(20,184,166,0.08);
  --c567: #6366f1;   /* part 567/568 certification — indigo */
  --c567bg: rgba(99,102,241,0.08);
  --cNA: #64748b;    /* conditional/N-A — grey */
  --cNAbg: rgba(100,116,139,0.08);

  /* status */
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --green-bg: rgba(34,197,94,0.12);
  --yellow-bg: rgba(234,179,8,0.12);
  --red-bg: rgba(239,68,68,0.12);

  --sidebar-w: 260px;
  --font: 'IBM Plex Sans', sans-serif;
  --mono: 'IBM Plex Mono', monospace;
  --radius: 8px;
  --radius2: 4px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f1f5f9;
    --bg2: #ffffff;
    --bg3: #f8fafc;
    --bg4: #e2e8f0;
    --border: #cbd5e1;
    --border2: #94a3b8;
    --text: #0f172a;
    --text2: #475569;
    --text3: #94a3b8;
    --c100bg: rgba(59,130,246,0.06);
    --c200bg: rgba(239,68,68,0.06);
    --c300bg: rgba(245,158,11,0.06);
    --c400bg: rgba(20,184,166,0.06);
    --c567bg: rgba(99,102,241,0.06);
    --cNAbg: rgba(100,116,139,0.06);
    --shadow: 0 4px 24px rgba(0,0,0,0.1);
  }
}

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; overflow: hidden; }
button { cursor: pointer; font-family: var(--font); }
input, textarea, select { font-family: var(--font); }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Layout ── */
#app { display: flex; height: 100vh; }

/* ── Sidebar ── */
#sidebar {
  width: var(--sidebar-w);
  min-width: var(--sidebar-w);
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}
#sidebar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
#sidebar-logo .logo-icon {
  width: 32px; height: 32px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
#sidebar-logo .logo-text { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
#sidebar-logo .logo-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); }
#sidebar-tabs { display: flex; gap: 4px; }
.sidebar-tab {
  flex: 1; padding: 6px 4px; border: 1px solid var(--border);
  border-radius: var(--radius2); background: transparent; color: var(--text2);
  font-size: 12px; font-weight: 500; transition: all 0.15s;
}
.sidebar-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.sidebar-tab:hover:not(.active) { background: var(--bg3); color: var(--text); }

#sidebar-body { flex: 1; overflow-y: auto; padding: 8px 0; }

/* Wizard steps in sidebar */
.wiz-step {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 14px; cursor: pointer; transition: background 0.1s;
}
.wiz-step:hover { background: var(--bg3); }
.wiz-step.active { background: var(--bg3); border-left: 2px solid var(--accent); }
.wiz-step.done { opacity: 0.8; }
.step-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--bg4); border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-family: var(--mono); font-weight: 600;
  flex-shrink: 0; margin-top: 1px;
}
.wiz-step.active .step-num { background: var(--accent); border-color: var(--accent); color: #fff; }
.wiz-step.done .step-num { background: var(--green); border-color: var(--green); color: #fff; }
.step-info .step-label { font-size: 11px; font-weight: 600; color: var(--text2); }
.step-info .step-answer { font-size: 11px; color: var(--accent); font-family: var(--mono); }

/* Track list in sidebar */
.track-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; cursor: pointer; transition: background 0.1s;
}
.track-item:hover { background: var(--bg3); }
.track-item.active { background: var(--bg3); border-left: 2px solid var(--accent); }
.pip { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.pip.green { background: var(--green); }
.pip.yellow { background: var(--yellow); }
.pip.red { background: var(--red); }
.pip.unset { background: var(--border2); }
.track-item-label { font-size: 11px; color: var(--text2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-item-pct { font-size: 10px; font-family: var(--mono); color: var(--text3); }

/* ── Main area ── */
#main {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}

/* ── Top bar ── */
#topbar {
  height: 52px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 12px;
  flex-shrink: 0;
}
#topbar-title { font-size: 14px; font-weight: 600; flex: 1; }
#topbar-title span { color: var(--text3); font-weight: 400; font-family: var(--mono); font-size: 12px; margin-left: 8px; }
.topbar-btn {
  padding: 6px 12px; border-radius: var(--radius2); border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 12px; font-weight: 500;
  transition: all 0.15s;
}
.topbar-btn:hover { background: var(--bg3); color: var(--text); }
.topbar-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.topbar-btn.primary:hover { background: var(--accent2); }

/* ── Content area ── */
#content { flex: 1; overflow-y: auto; }

/* ── Wizard view ── */
#view-wizard { padding: 32px; max-width: 680px; margin: 0 auto; }
.wizard-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 28px; margin-bottom: 16px;
}
.wizard-q-label { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.wizard-q-text { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.wizard-q-hint { font-size: 12px; color: var(--text3); margin-bottom: 16px; line-height: 1.55; padding: 8px 12px; background: var(--bg3); border-left: 3px solid var(--accent); border-radius: 0 4px 4px 0; }
.options-grid { display: flex; flex-direction: column; gap: 8px; }
.opt-btn {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 16px; border-radius: var(--radius2);
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); text-align: left; transition: all 0.15s;
  width: 100%;
}
.opt-btn:hover { border-color: var(--accent); background: var(--bg4); }
.opt-btn.selected { border-color: var(--accent); background: rgba(59,130,246,0.1); }
.opt-btn.selected .opt-radio { background: var(--accent); border-color: var(--accent); }
.opt-btn.multi-selected { border-color: var(--green); background: rgba(34,197,94,0.08); }
.opt-btn.multi-selected .opt-check { background: var(--green); border-color: var(--green); }
.opt-radio, .opt-check {
  width: 16px; height: 16px; border-radius: 50%; border: 2px solid var(--border2);
  flex-shrink: 0; margin-top: 2px; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.opt-check { border-radius: 3px; }
.opt-check::after { content: '✓'; color: #fff; font-size: 10px; display: none; }
.opt-btn.multi-selected .opt-check::after { display: block; }
.opt-label { font-size: 14px; font-weight: 500; }
.opt-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
.wizard-nav { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-back { padding: 8px 20px; border-radius: var(--radius2); border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 13px; }
.btn-back:hover { background: var(--bg3); color: var(--text); }
.btn-next { padding: 8px 20px; border-radius: var(--radius2); border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; }
.btn-next:hover { background: var(--accent2); }
.btn-next:disabled { background: var(--bg4); color: var(--text3); cursor: not-allowed; }

/* progress bar */
.wizard-progress { height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 28px; }
.wizard-progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

/* ── Results view ── */
#view-results { padding: 20px; }
.results-summary {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 20px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.sum-stat { display: flex; align-items: center; gap: 8px; }
.sum-badge {
  padding: 2px 10px; border-radius: 20px; font-size: 11px; font-family: var(--mono); font-weight: 600;
}
.badge-86 { background: var(--c100bg); color: var(--c100); }
.badge-1036 { background: var(--c200bg); color: var(--c200); }
.badge-1037 { background: var(--c300bg); color: var(--c300); }
.badge-1065 { background: var(--c400bg); color: var(--c400); }
.badge-1066 { background: var(--c1066bg); color: var(--c1066); }
.badge-cert { background: var(--c567bg); color: var(--c567); }
.badge-na { background: var(--cNAbg); color: var(--cNA); }
.sum-sep { width: 1px; height: 20px; background: var(--border); }
.project-end-wrap { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.project-end-wrap label { font-size: 11px; color: var(--text3); }
.project-end-wrap input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius2); color: var(--text); padding: 4px 8px; font-size: 12px; font-family: var(--mono); }

/* Filter bar */
.filter-bar {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 14px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.filter-label { font-size: 11px; color: var(--text3); font-weight: 600; margin-right: 4px; }
.filter-chip {
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); font-size: 11px; font-weight: 500; transition: all 0.15s;
}
.filter-chip:hover { border-color: var(--border2); color: var(--text); }
.filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Section groups */
.section-group { margin-bottom: 12px; }
.group-header {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  border-radius: var(--radius); cursor: pointer; transition: opacity 0.15s;
  border: 1px solid transparent; margin-bottom: 4px;
}
.group-header:hover { opacity: 0.85; }
.group-chevron { font-size: 12px; transition: transform 0.2s; color: #fff; }
.group-header.collapsed .group-chevron { transform: rotate(-90deg); }
.group-title { font-size: 13px; font-weight: 700; color: #fff; flex: 1; }
.group-count { font-size: 11px; font-family: var(--mono); color: rgba(255,255,255,0.7); }
.group-pct { font-size: 11px; font-family: var(--mono); color: rgba(255,255,255,0.9); background: rgba(0,0,0,0.2); padding: 2px 8px; border-radius: 20px; }

.gh-86 { background: linear-gradient(135deg, #1d4ed8, #3b82f6); }
.gh-1036 { background: linear-gradient(135deg, #b91c1c, #ef4444); }
.gh-1037 { background: linear-gradient(135deg, #b45309, #f59e0b); }
.gh-1065 { background: linear-gradient(135deg, #0f766e, #14b8a6); }
.gh-cert { background: linear-gradient(135deg, #4338ca, #6366f1); }
.gh-1066 { background: linear-gradient(135deg, #6d28d9, #8b5cf6); }

/* Section cards */
.section-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 6px; overflow: hidden; transition: border-color 0.15s;
}
.section-card:hover { border-color: var(--border2); }
.section-card.expanded { border-color: var(--accent); }
.section-card-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; cursor: pointer;
}
.sec-pips { display: flex; gap: 3px; }
.pip-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border2); }
.pip-dot.green { background: var(--green); box-shadow: 0 0 4px rgba(34,197,94,0.4); }
.pip-dot.yellow { background: var(--yellow); box-shadow: 0 0 4px rgba(234,179,8,0.4); }
.pip-dot.red { background: var(--red); box-shadow: 0 0 4px rgba(239,68,68,0.4); }
.sec-num { font-family: var(--mono); font-size: 11px; font-weight: 600; color: var(--text3); min-width: 60px; }
.sec-title { font-size: 13px; font-weight: 500; flex: 1; }
.sec-na-badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-family: var(--mono); background: var(--cNAbg); color: var(--cNA); }
.sec-pct-badge { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-family: var(--mono); background: var(--bg4); color: var(--text2); }
.sec-chevron { font-size: 11px; color: var(--text3); transition: transform 0.2s; }
.section-card.expanded .sec-chevron { transform: rotate(90deg); }

/* Section body */
.section-body {
  display: none; border-top: 1px solid var(--border); padding: 16px;
  gap: 20px;
}
.section-card.expanded .section-body { display: flex; }
.reg-panel { width: 340px; min-width: 300px; flex-shrink: 0; }
.track-panel { flex: 1; min-width: 0; }

/* Reg panel */
.reg-summary { margin-bottom: 16px; }
.reg-field { margin-bottom: 10px; }
.reg-field-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.reg-field-val { font-size: 12px; color: var(--text2); line-height: 1.5; }
.tags-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }
.tag { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 600; font-family: var(--mono); }
.tag-blue { background: var(--c100bg); color: var(--c100); }
.tag-red { background: var(--c200bg); color: var(--c200); }
.tag-amber { background: var(--c300bg); color: var(--c300); }
.tag-teal { background: var(--c400bg); color: var(--c400); }
.tag-indigo { background: var(--c567bg); color: var(--c567); }
.tag-grey { background: var(--cNAbg); color: var(--cNA); }
.tag-green { background: var(--green-bg); color: var(--green); }
.cond-list, .deliv-list { list-style: none; }
.cond-list li, .deliv-list li { font-size: 11px; color: var(--text2); padding: 3px 0 3px 16px; position: relative; border-bottom: 1px solid var(--border); }
.cond-list li:last-child, .deliv-list li:last-child { border-bottom: none; }
.cond-list li::before { content: '◆'; position: absolute; left: 0; font-size: 6px; top: 6px; color: var(--text3); }
.deliv-list li::before { content: '→'; position: absolute; left: 0; font-size: 10px; top: 3px; color: var(--accent); }
.ecfr-link { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; margin-top: 10px; color: var(--accent); }
.apply-note { font-size: 11px; padding: 6px 10px; border-radius: var(--radius2); margin-top: 10px; }
.apply-note.applies { background: var(--green-bg); color: var(--green); }
.apply-note.na { background: var(--cNAbg); color: var(--cNA); }
.apply-note.maybe { background: var(--yellow-bg); color: var(--yellow); }
.apply-advisory { font-size: 11px; padding: 6px 10px; border-radius: var(--radius2); margin-top: 6px; background: var(--c100bg); color: var(--c100); }
.num-answer-row { display: flex; flex-direction: column; gap: 6px; }
.year-input { width: 100%; padding: 14px 16px; font-family: var(--mono); font-size: 18px; border: 1px solid var(--border); border-radius: var(--radius2); background: var(--bg2); color: var(--text); }
.year-input:focus { outline: none; border-color: var(--brand-red); }
.year-hint { visibility: hidden; font-size: 11px; color: var(--red); }

/* Track panel */
.ryg-row { display: flex; gap: 6px; margin-bottom: 14px; }
.ryg-btn {
  flex: 1; padding: 7px 4px; border-radius: var(--radius2); border: 1px solid var(--border);
  background: transparent; font-size: 11px; font-weight: 600; color: var(--text3); transition: all 0.15s;
}
.ryg-btn:hover { opacity: 0.8; }
.ryg-btn.green-active { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.ryg-btn.yellow-active { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
.ryg-btn.red-active { background: var(--red-bg); border-color: var(--red); color: var(--red); }

.form-row { display: flex; gap: 10px; margin-bottom: 10px; }
.form-group { flex: 1; min-width: 0; }
.form-group.full { flex-basis: 100%; }
.form-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 4px; }
.form-input {
  width: 100%; padding: 6px 10px; border-radius: var(--radius2);
  border: 1px solid var(--border); background: var(--bg3); color: var(--text);
  font-size: 12px; transition: border-color 0.15s;
}
.form-input:focus { outline: none; border-color: var(--accent); }
textarea.form-input { resize: vertical; min-height: 60px; }
input[type="range"].form-input { padding: 0; border: none; background: transparent; }

.pct-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.pct-val { font-size: 13px; font-family: var(--mono); font-weight: 600; color: var(--accent); min-width: 36px; }
input[type="range"] { flex: 1; accent-color: var(--accent); }

/* Subtasks */
.subtasks-section { margin-top: 14px; }
.subtask-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.subtask-title { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.btn-add-sub {
  padding: 3px 10px; border-radius: var(--radius2); border: 1px dashed var(--border2);
  background: transparent; color: var(--text2); font-size: 11px;
}
.btn-add-sub:hover { border-color: var(--accent); color: var(--accent); }
.subtask-item {
  display: grid; grid-template-columns: 20px 1fr 100px 90px 90px 24px;
  gap: 6px; align-items: center;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.subtask-item:last-child { border-bottom: none; }
.sub-check { width: 16px; height: 16px; accent-color: var(--green); cursor: pointer; }
.sub-text { font-size: 12px; background: transparent; border: none; color: var(--text); width: 100%; padding: 2px 4px; border-radius: 2px; }
.sub-text:focus { outline: none; background: var(--bg3); }
.sub-text.done-text { text-decoration: line-through; color: var(--text3); }
.sub-input { font-size: 11px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius2); padding: 3px 6px; color: var(--text); width: 100%; }
.sub-input:focus { outline: none; border-color: var(--accent); }
.sub-progress { height: 3px; background: var(--border); border-radius: 2px; position: relative; }
.sub-progress-bar { height: 100%; background: var(--green); border-radius: 2px; }
.btn-del-sub { background: transparent; border: none; color: var(--text3); font-size: 14px; padding: 0; width: 24px; text-align: center; }
.btn-del-sub:hover { color: var(--red); }

/* Docs list */
.docs-section { margin-top: 12px; }
.doc-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid var(--border); }
.doc-name { font-size: 12px; }
.btn-del-doc { background: transparent; border: none; color: var(--text3); font-size: 12px; cursor: pointer; }
.btn-del-doc:hover { color: var(--red); }
.add-doc-row { display: flex; gap: 6px; margin-top: 6px; }
.add-doc-row input { flex: 1; }
.add-doc-row button { padding: 5px 12px; border-radius: var(--radius2); border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; }
.add-doc-row button:hover { background: var(--bg3); color: var(--text); }

/* Save row */
.save-row { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-top: 14px; }
.save-flash { font-size: 11px; color: var(--green); opacity: 0; transition: opacity 0.3s; }
.save-flash.visible { opacity: 1; }
.btn-save { padding: 7px 20px; border-radius: var(--radius2); border: none; background: var(--accent); color: #fff; font-size: 13px; font-weight: 600; }
.btn-save:hover { background: var(--accent2); }

/* ── Dashboard view ── */
#view-dashboard { padding: 24px; }
.dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
.dash-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
}
.dash-card-label { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.dash-card-val { font-size: 32px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.dash-card-sub { font-size: 11px; color: var(--text3); margin-top: 4px; }
.dash-card.green-card .dash-card-val { color: var(--green); }
.dash-card.yellow-card .dash-card-val { color: var(--yellow); }
.dash-card.red-card .dash-card-val { color: var(--red); }
.dash-card.blue-card .dash-card-val { color: var(--accent); }

.dash-lists { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.dash-list-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.dash-list-title { font-size: 12px; font-weight: 700; margin-bottom: 10px; }
.dash-list-title.red { color: var(--red); }
.dash-list-title.yellow { color: var(--yellow); }
.dash-list-item {
  padding: 6px 0; border-bottom: 1px solid var(--border); cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
}
.dash-list-item:last-child { border-bottom: none; }
.dash-list-item:hover { color: var(--accent); }
.dash-item-sec { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.dash-item-pct { font-family: var(--mono); font-size: 11px; color: var(--text2); }

/* ── Empty / splash ── */
#view-splash { display: flex; align-items: center; justify-content: center; height: 100%; }
.splash-inner { text-align: center; max-width: 440px; padding: 40px; }
.splash-logo { font-size: 48px; margin-bottom: 16px; }
.splash-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.splash-sub { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
.btn-start { padding: 12px 32px; border-radius: var(--radius); border: none; background: var(--accent); color: #fff; font-size: 15px; font-weight: 700; }
.btn-start:hover { background: var(--accent2); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ── Utilities ── */
.hidden { display: none !important; }
.small-section-head { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 12px; }

/* -- Subsection checklist -- */
.subsec-list { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 12px; }
.subsec-list-title {
  font-size: 10px; font-family: var(--mono); color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.subsec-progress-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
.subsec-progress-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; }
.subsec-progress-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }
.subsec-progress-label { font-size: 10px; font-family: var(--mono); color: var(--text3); min-width: 36px; text-align: right; }
.subsec-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 5px 6px; border-radius: var(--radius2);
  transition: background 0.1s; cursor: pointer;
}
.subsec-item:hover { background: var(--bg3); }
.subsec-item input[type=checkbox] { width: 14px; height: 14px; accent-color: var(--green); cursor: pointer; flex-shrink: 0; margin-top: 2px; }
.subsec-item label { font-size: 12px; color: var(--text2); cursor: pointer; line-height: 1.4; }
.subsec-item.checked label { text-decoration: line-through; color: var(--text3); }
.subsec-clear-btn { background: transparent; border: none; color: var(--text3); font-size: 11px; cursor: pointer; padding: 0; }
.subsec-clear-btn:hover { color: var(--red); }


/* -- Deliverables checklist -- */
.deliv-section { margin-top: 18px; border-top: 1px solid var(--border); padding-top: 14px; }
.deliv-section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px;
}
.deliv-section-title {
  font-size: 11px; font-family: var(--mono); color: var(--accent);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600;
}
.deliv-progress-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.deliv-item {
  display: grid;
  grid-template-columns: 20px 1fr 100px 90px 90px;
  gap: 8px; align-items: center;
  padding: 8px 6px; border-bottom: 1px solid var(--border);
}
.deliv-item:last-child { border-bottom: none; }
.deliv-item input[type=checkbox] {
  width: 16px; height: 16px; accent-color: var(--accent);
  cursor: pointer; margin: 0;
}
.deliv-text {
  font-size: 12px; color: var(--text); padding: 2px 4px;
  line-height: 1.4;
}
.deliv-text.done { text-decoration: line-through; color: var(--text3); }
.deliv-header-row {
  display: grid;
  grid-template-columns: 20px 1fr 100px 90px 90px;
  gap: 8px; padding: 0 6px 4px;
  font-size: 9px; font-family: var(--mono); color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
}


/* -- Quick badges on section card header -- */
.qbadges { display: inline-flex; gap: 3px; align-items: center; flex-wrap: nowrap; }
.qbadge {
  padding: 1px 6px; border-radius: 3px;
  font-size: 9px; font-family: var(--mono); font-weight: 700;
  letter-spacing: 0.4px; text-transform: uppercase;
  line-height: 1.4; white-space: nowrap;
}
.qbadge-mand { background: rgba(239,68,68,0.18); color: #dc2626; border: 1px solid rgba(239,68,68,0.35); }
.qbadge-test { background: rgba(245,158,11,0.18); color: #d97706; border: 1px solid rgba(245,158,11,0.35); }
.qbadge-form { background: rgba(99,102,241,0.18); color: #6366f1; border: 1px solid rgba(99,102,241,0.35); }
.qbadge-doc  { background: rgba(20,184,166,0.18); color: #0d9488; border: 1px solid rgba(20,184,166,0.35); }
.qbadge-crit { background: rgba(34,197,94,0.18); color: #16a34a; border: 1px solid rgba(34,197,94,0.35); }
@media (prefers-color-scheme: light) {
  .qbadge-crit { color: #15803d; }
}

@media (prefers-color-scheme: light) {
  .qbadge-mand { color: #b91c1c; }
  .qbadge-test { color: #b45309; }
  .qbadge-form { color: #4338ca; }
  .qbadge-doc  { color: #0f766e; }
}

/* -- Mandated Tests & Forms panel -- */
.mtf-panel {
  margin-top: 14px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}
.mtf-panel-title {
  font-size: 11px; font-family: var(--mono); color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-weight: 700; margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}
.mtf-panel-title::before {
  content: ''; width: 3px; height: 12px;
  background: linear-gradient(180deg, var(--c300), var(--c567));
  border-radius: 2px;
}
.mtf-group { margin-bottom: 12px; }
.mtf-group:last-child { margin-bottom: 0; }
.mtf-group-label {
  font-size: 10px; font-family: var(--mono); color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 5px;
}
.mtf-group-label-dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block;
}
.mtf-group-tests .mtf-group-label-dot { background: var(--c300); }
.mtf-group-forms .mtf-group-label-dot { background: var(--c567); }
.mtf-group-docs  .mtf-group-label-dot { background: var(--c400); }
.mtf-list { list-style: none; padding-left: 0; }
.mtf-list li {
  font-size: 11px; color: var(--text2); line-height: 1.5;
  padding: 3px 0 3px 14px; position: relative;
  border-bottom: 1px dashed var(--border);
}
.mtf-list li:last-child { border-bottom: none; }
.mtf-list li::before {
  content: ''; position: absolute; left: 0; top: 10px;
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--text3);
}
.mtf-group-tests .mtf-list li::before { background: var(--c300); }
.mtf-group-forms .mtf-list li::before { background: var(--c567); }
.mtf-group-docs  .mtf-list li::before { background: var(--c400); }
.mtf-empty {
  font-size: 11px; color: var(--text3); font-style: italic;
  padding: 2px 0;
}


/* -- Compliance summary report modal -- */
.report-modal {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 100;
}
.report-modal.visible { display: flex; }
.report-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  width: min(820px, 92vw); max-height: 90vh; overflow: hidden;
  display: flex; flex-direction: column;
  box-shadow: var(--shadow);
}
.report-head {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.report-head h2 { font-size: 15px; font-weight: 700; }
.report-actions { display: flex; gap: 6px; }
.report-body {
  padding: 24px 28px; overflow-y: auto; flex: 1;
  font-family: var(--font); color: var(--text);
}
.report-body h1 { font-size: 22px; margin-bottom: 4px; font-weight: 700; }
.report-body h2 { font-size: 15px; margin: 18px 0 8px; font-weight: 700;
  padding-bottom: 4px; border-bottom: 1px solid var(--border); }
.report-body h3 { font-size: 13px; margin: 12px 0 6px; font-weight: 700; color: var(--text2); }
.report-body p { font-size: 13px; line-height: 1.6; margin-bottom: 8px; color: var(--text2); }
.report-body ul, .report-body ol { margin: 6px 0 12px 20px; }
.report-body li { font-size: 13px; line-height: 1.6; color: var(--text2); margin-bottom: 3px; }
.report-meta { color: var(--text3); font-size: 11px; font-family: var(--mono); margin-bottom: 12px; }
.report-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin: 14px 0; }
.report-stat { background: var(--bg3); border-radius: var(--radius2); padding: 10px 14px; }
.report-stat-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; }
.report-stat-val { font-size: 22px; font-weight: 700; font-family: var(--mono); margin-top: 2px; }
.report-stat-val.green { color: var(--green); }
.report-stat-val.yellow { color: var(--yellow); }
.report-stat-val.red { color: var(--red); }
.report-stat-val.blue { color: var(--accent); }
.report-bar-group { margin: 8px 0 14px; }
.report-bar-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.report-bar-bg { height: 8px; background: var(--bg4); border-radius: 4px; overflow: hidden; }
.report-bar-fill { height: 100%; transition: width 0.3s; }
.rb-86 { background: var(--c100); }
.rb-1036 { background: var(--c200); }
.rb-1037 { background: var(--c300); }
.rb-1065 { background: var(--c400); }
.rb-cert { background: var(--c567); }
.report-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 12px; }
.report-table th, .report-table td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
.report-table th { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; }
.report-table tr:hover { background: var(--bg3); }
.report-table .col-sec { font-family: var(--mono); white-space: nowrap; }
.report-table .col-status { width: 90px; }
.report-table .col-due { width: 100px; font-family: var(--mono); white-space: nowrap; }
.report-table .col-owner { width: 140px; }
.status-cell.green { color: var(--green); }
.status-cell.yellow { color: var(--yellow); }
.status-cell.red { color: var(--red); }
.status-cell.unset { color: var(--text3); }
.due-overdue { color: var(--red); font-weight: 600; }
.due-soon { color: var(--yellow); }
.report-empty { font-size: 12px; color: var(--text3); font-style: italic; padding: 8px 0; }

/* -- Workload view -- */
.workload-summary {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px 20px; margin-bottom: 16px;
  display: flex; gap: 16px; flex-wrap: wrap;
}
.wl-stat-box { flex: 1; min-width: 120px; }
.wl-stat-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; }
.wl-stat-val { font-size: 22px; font-weight: 700; font-family: var(--mono); margin-top: 2px; }
.wl-stat-val.red { color: var(--red); }
.wl-stat-val.yellow { color: var(--yellow); }
.wl-stat-val.blue { color: var(--accent); }
.owner-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 12px; overflow: hidden;
}
.owner-card-head {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center; cursor: pointer;
}
.owner-card-head:hover { background: var(--bg3); }
.owner-name {
  font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 10px;
}
.owner-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--c567));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 11px; font-weight: 700; font-family: var(--mono);
}
.owner-stats { display: flex; gap: 14px; font-size: 11px; font-family: var(--mono); }
.owner-stat { display: flex; align-items: center; gap: 4px; color: var(--text2); }
.owner-stat.red { color: var(--red); font-weight: 600; }
.owner-stat.yellow { color: var(--yellow); font-weight: 600; }
.owner-stat.green { color: var(--green); }
.owner-card-body { padding: 0 16px 12px; }
.bucket {
  margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--border);
}
.bucket-title {
  font-size: 11px; font-family: var(--mono); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px; font-weight: 700;
}
.bucket-title.bk-overdue { color: var(--red); }
.bucket-title.bk-week { color: var(--yellow); }
.bucket-title.bk-month { color: var(--accent); }
.bucket-title.bk-future { color: var(--text2); }
.bucket-title.bk-nodate { color: var(--text3); }
.bucket-row {
  display: grid; grid-template-columns: 80px 1fr 90px 90px;
  gap: 10px; padding: 5px 0; align-items: center;
  font-size: 12px; cursor: pointer; border-radius: var(--radius2);
}
.bucket-row:hover { background: var(--bg3); padding-left: 6px; padding-right: 6px; }
.bucket-row .br-sec { font-family: var(--mono); color: var(--text3); }
.bucket-row .br-title { color: var(--text); }
.bucket-row .br-due { font-family: var(--mono); font-size: 11px; }
.bucket-row .br-status { font-size: 11px; }


/* -- Acceptance Criteria checklist -- */
.crit-section {
  margin-top: 18px;
  border-top: 1px solid var(--border);
  padding-top: 14px;
}
.crit-section-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.crit-section-title {
  font-size: 11px; font-family: var(--mono); color: var(--c200);
  text-transform: uppercase; letter-spacing: 0.5px; font-weight: 700;
  display: flex; align-items: center; gap: 6px;
}
.crit-section-title::before {
  content: ''; width: 3px; height: 12px;
  background: linear-gradient(180deg, var(--c200), var(--c100));
  border-radius: 2px;
}
.crit-progress-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }
.crit-progress-bar-bg { flex: 1; height: 5px; background: var(--bg4); border-radius: 3px; position: relative; overflow: hidden; }
.crit-progress-bar-fill { height: 100%; transition: width 0.3s; }
.crit-progress-bar-fill.green { background: var(--green); }
.crit-progress-bar-fill.yellow { background: var(--yellow); }
.crit-progress-bar-fill.red { background: var(--red); }
.crit-progress-label { font-size: 10px; font-family: var(--mono); color: var(--text3); min-width: 60px; text-align: right; }
.crit-stats {
  display: flex; gap: 10px; margin-bottom: 10px;
  font-size: 11px; font-family: var(--mono);
}
.crit-stat { display: flex; align-items: center; gap: 4px; color: var(--text3); }
.crit-stat .crit-stat-dot {
  width: 7px; height: 7px; border-radius: 50%;
}
.crit-stat.pass-stat { color: var(--green); }
.crit-stat.fail-stat { color: var(--red); }
.crit-stat.prog-stat { color: var(--yellow); }
.crit-stat.na-stat { color: var(--text3); }
.crit-stat.unset-stat { color: var(--text2); }
.crit-stat.pass-stat .crit-stat-dot { background: var(--green); }
.crit-stat.fail-stat .crit-stat-dot { background: var(--red); }
.crit-stat.prog-stat .crit-stat-dot { background: var(--yellow); }
.crit-stat.na-stat .crit-stat-dot { background: var(--text3); }
.crit-stat.unset-stat .crit-stat-dot { background: var(--bg4); border: 1px solid var(--border2); }

.crit-item {
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: var(--radius2);
  margin-bottom: 6px;
  background: var(--bg3);
  border-left: 3px solid var(--border2);
}
.crit-item.crit-pass { border-left-color: var(--green); }
.crit-item.crit-fail { border-left-color: var(--red); }
.crit-item.crit-prog { border-left-color: var(--yellow); }
.crit-item.crit-na   { border-left-color: var(--text3); opacity: 0.65; }
.crit-item-row1 {
  display: flex; gap: 8px; align-items: flex-start;
  margin-bottom: 6px;
}
.crit-id-ref {
  font-family: var(--mono); font-size: 10px; color: var(--text3);
  flex-shrink: 0; padding-top: 2px;
}
.crit-text {
  flex: 1; font-size: 12px; color: var(--text); line-height: 1.5;
}
.crit-state-row {
  display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap;
}
.crit-state-btn {
  padding: 3px 9px; border-radius: var(--radius2);
  border: 1px solid var(--border);
  background: transparent; color: var(--text3);
  font-size: 10px; font-family: var(--mono); font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.4px;
  cursor: pointer; transition: all 0.15s;
}
.crit-state-btn:hover { background: var(--bg4); color: var(--text); }
.crit-state-btn.crit-active-pass { background: var(--green-bg); color: var(--green); border-color: var(--green); }
.crit-state-btn.crit-active-fail { background: var(--red-bg); color: var(--red); border-color: var(--red); }
.crit-state-btn.crit-active-prog { background: var(--yellow-bg); color: var(--yellow); border-color: var(--yellow); }
.crit-state-btn.crit-active-na   { background: var(--cNAbg); color: var(--cNA); border-color: var(--cNA); }

.crit-meta-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 6px; margin-bottom: 5px;
}
.crit-meta-input {
  padding: 4px 8px; border-radius: var(--radius2);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 11px;
  width: 100%;
}
.crit-meta-input:focus { outline: none; border-color: var(--accent); }
.crit-evidence-input {
  width: 100%; padding: 4px 8px; border-radius: var(--radius2);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 11px; margin-bottom: 5px;
}
.crit-note-input {
  width: 100%; padding: 4px 8px; border-radius: var(--radius2);
  border: 1px solid var(--border); background: var(--bg2);
  color: var(--text); font-size: 11px;
  resize: vertical; min-height: 28px; font-family: var(--font);
}
.crit-rollup-suggest {
  margin-top: 12px;
  padding: 8px 12px;
  background: var(--bg3);
  border: 1px dashed var(--accent);
  border-radius: var(--radius2);
  font-size: 11px;
  display: flex; justify-content: space-between; align-items: center;
}
.crit-rollup-text { color: var(--text2); }
.crit-rollup-suggest button {
  padding: 4px 12px;
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--radius2);
  font-size: 11px; font-weight: 600;
  cursor: pointer;
}
.crit-rollup-suggest button:hover { background: var(--accent2); }
.crit-empty {
  font-size: 11px; color: var(--text3);
  font-style: italic; padding: 6px 0;
}


/* -- Users view -- */
.users-view-wrap { padding: 24px; }
.users-view-wrap h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.users-add-row {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 14px; margin: 16px 0;
  display: grid; grid-template-columns: 1fr 1fr 100px 100px; gap: 10px; align-items: end;
}
.users-add-row label { display: block; font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.users-add-row input { width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: var(--radius2); background: var(--bg3); color: var(--text); font-size: 13px; }
.btn-add-user { padding: 8px 16px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius2); font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-add-user:hover { background: var(--accent2); }
.users-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
.users-table th, .users-table td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); }
.users-table th { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.users-table tr:hover { background: var(--bg3); }
.users-table input { width: 100%; padding: 4px 8px; border: 1px solid transparent; background: transparent; color: var(--text); font-size: 13px; border-radius: var(--radius2); font-family: var(--font); }
.users-table input:hover { border-color: var(--border); background: var(--bg3); }
.users-table input:focus { border-color: var(--accent); background: var(--bg3); outline: none; }
.user-avatar-tag {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--c567));
  color: #fff; font-size: 11px; font-weight: 700; font-family: var(--mono);
}
.btn-del-user { padding: 4px 10px; background: transparent; color: var(--text3); border: 1px solid var(--border); border-radius: var(--radius2); font-size: 11px; cursor: pointer; }
.btn-del-user:hover { color: var(--red); border-color: var(--red); }
.users-empty { color: var(--text3); font-style: italic; padding: 20px 0; }
.users-count-info { font-size: 12px; color: var(--text3); margin-bottom: 12px; }

/* -- Workload view toggle -- */
.wl-view-toggle {
  display: inline-flex; gap: 0;
  margin: 0 0 14px 0;
  border: 1px solid var(--border); border-radius: var(--radius2); overflow: hidden;
}
.wl-view-toggle button {
  padding: 6px 14px;
  background: var(--bg2); border: none; color: var(--text2);
  font-size: 12px; cursor: pointer;
}
.wl-view-toggle button.active { background: var(--accent); color: #fff; }
.wl-controls {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 12px;
}
.wl-control-label { font-size: 11px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; }
.wl-control-group { display: inline-flex; gap: 0; border: 1px solid var(--border); border-radius: var(--radius2); overflow: hidden; }
.wl-control-group button {
  padding: 4px 10px; background: var(--bg2); color: var(--text2);
  border: none; font-size: 11px; cursor: pointer;
}
.wl-control-group button.active { background: var(--accent); color: #fff; }

/* -- Gantt chart -- */
.gantt-wrap {
  display: grid;
  grid-template-columns: 1fr 220px;
  gap: 12px;
}
.gantt-main {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  overflow-x: auto; overflow-y: auto;
  max-height: 78vh;
}
.gantt-unsched {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px;
  max-height: 78vh; overflow-y: auto;
}
.gantt-unsched-title {
  font-size: 11px; font-family: var(--mono); color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.5px;
  font-weight: 700; margin-bottom: 8px;
}
.gantt-unsched-item {
  padding: 6px 8px; border-bottom: 1px dashed var(--border);
  font-size: 11px; cursor: pointer; border-radius: var(--radius2);
}
.gantt-unsched-item:hover { background: var(--bg3); padding-left: 10px; }
.gantt-unsched-sec { font-family: var(--mono); color: var(--text3); font-size: 10px; }
.gantt-unsched-title-row { color: var(--text); }
.gantt-unsched-owner { color: var(--text2); font-size: 10px; }
.gantt-svg { display: block; }
.gantt-row-label {
  fill: var(--text);
  font-family: var(--font); font-size: 11px;
  font-weight: 600;
}
.gantt-row-sublabel {
  fill: var(--text3);
  font-family: var(--mono); font-size: 9px;
}
.gantt-grid-line { stroke: var(--border); stroke-width: 0.5; }
.gantt-grid-line.major { stroke: var(--border2); stroke-width: 1; }
.gantt-grid-line.today { stroke: var(--accent); stroke-width: 1.5; stroke-dasharray: 4 2; }
.gantt-axis-label { fill: var(--text2); font-family: var(--mono); font-size: 9px; }
.gantt-axis-label.month { fill: var(--text); font-weight: 700; font-size: 11px; }
.gantt-bar { cursor: pointer; }
.gantt-bar rect { stroke-width: 1; }
.gantt-bar text { fill: var(--text); font-family: var(--font); font-size: 9px; font-weight: 600; pointer-events: none; }
.gantt-bar.bar-86 rect { fill: var(--c100bg); stroke: var(--c100); }
.gantt-bar.bar-1036 rect { fill: var(--c200bg); stroke: var(--c200); }
.gantt-bar.bar-1037 rect { fill: var(--c300bg); stroke: var(--c300); }
.gantt-bar.bar-1065 rect { fill: var(--c400bg); stroke: var(--c400); }
.gantt-bar.bar-cert rect { fill: var(--c567bg); stroke: var(--c567); }
.gantt-bar.bar-overdue rect { stroke-dasharray: 4 2; }
.gantt-row-band { fill: var(--bg3); opacity: 0.4; }
.gantt-row-band.alt { fill: transparent; }
.gantt-bar:hover rect { stroke-width: 2; }
.gantt-empty {
  padding: 40px;
  text-align: center;
  color: var(--text3);
  font-style: italic;
}

/* -- Autocomplete styling on inputs that use datalist -- */
.userlist-autocomplete::-webkit-calendar-picker-indicator {
  opacity: 0.5;
}


.gantt-unsched-secchips { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.gantt-unsched-chips-label {
  font-size: 10px; font-family: var(--mono); color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px;
}
.gantt-unsched-chips { display: flex; flex-wrap: wrap; gap: 4px; }
.gantt-unsched-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 7px; border-radius: 10px;
  background: var(--bg3); border: 1px solid var(--border);
  font-family: var(--mono); font-size: 10px;
  color: var(--text2); cursor: pointer;
  transition: all 0.15s;
}
.gantt-unsched-chip:hover {
  background: var(--accent); color: #fff; border-color: var(--accent);
}
.gantt-unsched-chip-n {
  background: var(--bg2); color: var(--text3);
  padding: 1px 5px; border-radius: 8px;
  font-size: 9px; font-weight: 700;
}
.gantt-unsched-chip:hover .gantt-unsched-chip-n {
  background: rgba(255,255,255,0.25); color: #fff;
}
.gantt-unsched-itemslabel {
  font-size: 10px; font-family: var(--mono); color: var(--text3);
  text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 4px;
}


/* -- Brand logo -- */
.brand-logo-img { width: 130px; height: auto; display: block; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3)); }
#sidebar-logo { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
#sidebar-logo > div { margin-top: 2px; }
.splash-logo-img { width: 220px; height: auto; margin: 0 auto 20px; display: block; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.25)); }
@media (prefers-color-scheme: light) {
  /* On light backgrounds the white logo would vanish; tint container behind it */
  .brand-logo-img, .splash-logo-img {
    background: var(--brand-red, #9d181d);
    padding: 8px 12px; border-radius: 6px;
  }
}
/* Subtle brand accent: thin crimson top border on the topbar */
#topbar { border-top: 2px solid var(--accent); }
/* Brand-red variable for reuse */
:root { --brand-red: #9d181d; --brand-red-bright: #c5303a; }


/* -- Forms view -- */
.forms-summary { display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
.forms-stat-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; min-width: 110px; }
.forms-stat-label { font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
.forms-stat-val { font-size: 24px; font-weight: 700; font-family: var(--mono); margin-top: 2px; }
.forms-stat-val.req { color: var(--accent); }
.forms-stat-val.maybe { color: var(--yellow); }
.forms-filter-row { display: inline-flex; gap: 0; margin-bottom: 18px; border: 1px solid var(--border); border-radius: var(--radius2); overflow: hidden; }
.forms-filter-btn { padding: 6px 14px; background: var(--bg2); border: none; color: var(--text2); font-size: 12px; cursor: pointer; }
.forms-filter-btn.active { background: var(--accent); color: #fff; }
.forms-cat { margin-bottom: 22px; }
.forms-cat-title {
  font-size: 11px; font-family: var(--mono); color: var(--text2);
  text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700;
  margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
}
.forms-cat-title::before { content: ''; width: 4px; height: 14px; background: var(--accent); border-radius: 2px; }
.form-card {
  background: var(--bg2); border: 1px solid var(--border); border-left: 3px solid var(--border2);
  border-radius: var(--radius2); padding: 12px 14px; margin-bottom: 8px;
}
.form-card.required { border-left-color: var(--accent); background: linear-gradient(90deg, rgba(197,48,58,0.06), var(--bg2) 40%); }
.form-card.maybe { border-left-color: var(--yellow); }
.form-card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
.form-num { font-family: var(--mono); font-size: 11px; color: var(--text3); font-weight: 700; }
.form-name { font-size: 14px; font-weight: 600; flex: 1; }
.form-badge { font-size: 9px; font-family: var(--mono); font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; padding: 2px 8px; border-radius: 3px; }
.req-badge { background: rgba(197,48,58,0.18); color: var(--accent); border: 1px solid rgba(197,48,58,0.4); }
.maybe-badge { background: rgba(234,179,8,0.18); color: var(--yellow); border: 1px solid rgba(234,179,8,0.4); }
.form-card-body { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 18px; }
.form-field { font-size: 12px; color: var(--text2); line-height: 1.5; }
.form-field-label { font-size: 9px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; display: inline-block; min-width: 64px; }
.form-notes { grid-column: 1 / -1; color: var(--text3); font-style: italic; margin-top: 2px; }

/* -- Filing deadlines -- */
.deadlines-list { display: flex; flex-direction: column; gap: 8px; }
.deadline-card { background: var(--bg2); border: 1px solid var(--border); border-left: 4px solid var(--text3); border-radius: var(--radius2); padding: 12px 14px; }
.deadline-card.urgency-critical { border-left-color: var(--red); }
.deadline-card.urgency-ongoing { border-left-color: var(--c300); }
.deadline-card.urgency-onetime { border-left-color: var(--green); }
.deadline-card.urgency-periodic { border-left-color: var(--c100); }
.deadline-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.deadline-urgency { font-size: 9px; font-family: var(--mono); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 3px; }
.urgency-critical .deadline-urgency { background: rgba(239,68,68,0.18); color: var(--red); }
.urgency-ongoing .deadline-urgency { background: rgba(245,158,11,0.18); color: var(--c300); }
.urgency-onetime .deadline-urgency { background: rgba(34,197,94,0.18); color: var(--green); }
.urgency-periodic .deadline-urgency { background: rgba(59,130,246,0.18); color: var(--c100); }
.deadline-name { font-size: 13px; font-weight: 600; }
.deadline-body { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 18px; }
.deadline-field { font-size: 12px; color: var(--text2); line-height: 1.5; }
.deadline-consequence { grid-column: 1 / -1; color: var(--red); font-size: 11px; margin-top: 4px; opacity: 0.85; }

</style>
</head>

{ sec:'1065.650', title:'Calculations for Gaseous Emission Mass Rates',
  part:1065, subpart:'G',
  desc:'Calculation procedures for converting gaseous concentrations to mass emission rates.',
  mandatory:true, conditions:['q_engine !== bev'],
  ecfr:'https://www.ecfr.gov/current/title-40/section-1065.650',
  deliverables:['Gaseous emission mass calculation worksheets'],
  subs:[], tests:[], forms:[],
  criteria:[
    {id:'1065.650-AC-01', ref:'(a)', text:'Molar mass of exhaust gas calculated using measured CO2, CO, HC, NOx, O2, and N2 concentrations; molar mass affects all mass flow calculations.', type:'test'},
    {id:'1065.650-AC-02', ref:'(b)', text:'Mass emission rate = concentration × exhaust mass flow rate × molecular weight ratio; units: g/s for continuous or g/test for bag; calculation checked against carbon balance.', type:'test'},
    {id:'1065.650-AC-03', ref:'(c)', text:'Background corrections applied using dilution air concentration measurements; corrected mass = total mass − (dilution ratio × background mass).', type:'test'}
  ],
  summary:{what:'Gaseous emission mass rate calculation procedures',who:'Test data analyst',when:'Post-test data processing',why:'Mass calculation converts analyzer readings to reportable emission rates',tags:['all']}
},

  subs:[], tests:[], forms:[],
  criteria:[

  ],

},

// ══════════════════════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════════════════════
async function loadData() {
  try {
    const resp = await fetch('/api/load');
    const d = await resp.json();
    if (d.answers) answers = d.answers;
    if (d.tracking) tracking = d.tracking;
    if (d.projectEnd !== undefined) projectEnd = d.projectEnd;
    if (Array.isArray(d.users)) users = d.users;
    // Migrate any tracking entries from older formats
    Object.keys(tracking).forEach(sec => { try { ensureTracking(sec); } catch(e) {} });
    if (!users.length) _migrateLegacyAssignees();
  } catch(e) {}
  // Migrate retired model-year buckets to an integer year
  if (typeof answers.q_my === 'string' && answers.q_my !== 'tbd') {
    const _myMap = { le2026: 2026, r2027_2030: 2027, ge2031: 2031 };
    if (_myMap[answers.q_my] !== undefined) answers.q_my = _myMap[answers.q_my];
    else if (/^\d{4}$/.test(answers.q_my)) answers.q_my = parseInt(answers.q_my, 10);
    else delete answers.q_my;
  }
  // Migrate the retired combined vehicle type to the split values
  if (answers.q_vtype === 'tractor_light') {
    answers.q_vtype = (answers.q_gvwr === 'le8500') ? 'light_vehicle' : 'tractor';
  }
  _syncAnswers(); // normalize restored answers against decision-driven filters
  // Determine applicable and show appropriate view
  if (classifyComplete()) {
    determineApplicableSections();
    showView('results');
  } else {
    showView('splash');
  }
}

function scheduleSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveData, 800);
}

async function saveData() {
  try {
    await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ answers, tracking, projectEnd, users })
    });
  } catch(e) {}
}

// ══════════════════════════════════════════════════════════
//  VIEW MANAGEMENT
// ══════════════════════════════════════════════════════════
function showView(v) {
  ['splash','wizard','results','dashboard','workload','users','forms'].forEach(id => {
    const el = document.getElementById('view-' + id);
    if (el) el.classList.toggle('hidden', id !== v);
  });
  currentView = v;
  if (v === 'wizard') renderWizard();
  if (v === 'results') renderResults();
  if (v === 'dashboard') renderDashboard();
  if (v === 'workload') renderWorkload();
  if (v === 'users') renderUsersView();
  if (v === 'forms') renderFormsView();
  renderSidebar();
}

function showWorkloadView() { showView('workload'); }

function showSidebarTab(tab) {
  currentSidebarTab = tab;
  document.querySelectorAll('.sidebar-tab').forEach((b,i) => {
    b.classList.toggle('active', (i===0 && tab==='classify') || (i===1 && tab==='track'));
  });
  renderSidebar();
}

// ══════════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════════
function renderSidebar() {
  const body = document.getElementById('sidebar-body');
  if (!body) return;
  if (currentSidebarTab === 'classify') {
    const visible = _visibleSteps ? _visibleSteps() : QUESTIONS.map((_,i)=>i);
    body.innerHTML = QUESTIONS.map((q, i) => {
      const skipped = typeof q.skipIf === 'function' && q.skipIf(answers);
      if (skipped) return ''; // hide skipped questions from sidebar
      const ans = answers[q.id];
      const done = ans !== undefined && ans !== null && (!Array.isArray(ans) || ans.length > 0);
      const active = currentView === 'wizard' && currentWizardStep === i;
      const visNum = visible.indexOf(i) + 1;
      let ansLabel = '';
      if (done) {
        const _opts = Array.isArray(q.options) ? q.options.concat([TBD_OPT]) : [TBD_OPT];
        const _lbl = v => (_opts.find(o => o.val === v) || {label: String(v)}).label;
        if (Array.isArray(ans)) {
          ansLabel = ans.map(_lbl).join(', ');
        } else {
          ansLabel = _lbl(ans);
        }
        if (ansLabel.length > 28) ansLabel = ansLabel.slice(0,28) + '…';
      }
      return `<div class="wiz-step ${active?'active':''} ${done?'done':''}" onclick="jumpToStep(${i})">
        <div class="step-num">${visNum}</div>
        <div class="step-info">
          <div class="step-label">${q.text.slice(0,32)}${q.text.length>32?'…':''}</div>
          ${done ? `<div class="step-answer">${ansLabel}</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } else {
    // track tab
    const applic = Object.keys(answers).length >= QUESTIONS.filter(q => typeof q.skipIf !== 'function' || !q.skipIf(answers)).length ? determineApplicableSections() : {};
    const applicSecs = SECTIONS.filter(s => applic[s.sec] && applic[s.sec].applies);
    if (!applicSecs.length) {
      body.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:12px;">Complete classification to see applicable sections.</div>';
      return;
    }
    body.innerHTML = applicSecs.map(s => {
      const t = tracking[s.sec] || {};
      const ryg = t.ryg || 'unset';
      const pct = t.pct || 0;
      return `<div class="track-item" onclick="navigateToSection('${s.sec}')">
        <div class="pip ${ryg}"></div>
        <div class="track-item-label">§${s.sec} — ${s.title}</div>
        <div class="track-item-pct">${pct}%</div>
      </div>`;
    }).join('');
  }
}

function jumpToStep(i) {
  currentWizardStep = i;
  showView('wizard');
}

function navigateToSection(sec) {
  showView('results');
  setTimeout(() => {
    const el = document.getElementById('sec-' + sec);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      el.classList.add('expanded');
      renderSectionBody(sec);
    }
  }, 100);
}
