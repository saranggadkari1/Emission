  const pct = Math.round((visIdx / visTotal) * 100);
  const isLast = (visIdx === visTotal - 1);

  document.getElementById('topbar-sub').textContent =
    `Classification — Step ${visIdx + 1} of ${visTotal}`;

  document.getElementById('view-wizard').innerHTML = `
    <div class="wizard-progress"><div class="wizard-progress-fill" style="width:${pct}%"></div></div>
    <div class="wizard-card">
      <div class="wizard-q-label">Question ${visIdx + 1} of ${visTotal} — ${q.id}</div>
      <div class="wizard-q-text">${q.text}</div>
      ${q.hint ? `<div class="wizard-q-hint">${q.hint}</div>` : ''}
      ${q.type === 'number' ? `
      <div class="options-grid">
        <div class="num-answer-row">
          <input type="number" class="year-input" id="numAns_${q.id}"
                 min="${q.min || 1990}" max="${q.max || 2050}" placeholder="${q.placeholder || ''}"
                 value="${typeof ans === 'number' ? ans : ''}"
                 oninput="setNumberAnswer('${q.id}', this.value)">
          <div class="year-hint" id="yearWarn_${q.id}">Enter a year between ${q.min || 1990} and ${q.max || 2050}</div>
        </div>
        <button class="opt-btn ${ans === 'tbd' ? 'selected' : ''}" onclick="selectOption('${q.id}','tbd',false)">
          <div class="opt-radio"></div>
          <div>
            <div class="opt-label">${TBD_OPT.label}</div>
            <div class="opt-desc">${TBD_OPT.desc}</div>
          </div>
        </button>
      </div>
      ` : `
      <div class="options-grid">
        ${_visibleOptions(q).map(o => {
          const sel = q.multi ? (Array.isArray(ans) && ans.includes(o.val)) : (ans === o.val);
          return `<button class="opt-btn ${q.multi ? (sel?'multi-selected':'') : (sel?'selected':'')}" onclick="selectOption('${q.id}','${o.val}',${q.multi})">
            <div class="${q.multi ? 'opt-check' : 'opt-radio'}"></div>
            <div>
              <div class="opt-label">${o.label}</div>
              ${o.desc ? `<div class="opt-desc">${o.desc}</div>` : ''}
            </div>
          </button>`;
        }).join('')}
      </div>
      `}
      <div class="wizard-nav">
        ${visIdx > 0 ? '<button class="btn-back" onclick="wizardBack()">← Back</button>' : ''}
        <button class="btn-next" onclick="wizardNext()" ${!hasAnswer(q.id)?'disabled':''}>
          ${isLast ? 'Finish →' : 'Next →'}
        </button>
      </div>
    </div>
  `;
}

function hasAnswer(id) {
  const q = QUESTIONS.find(q=>q.id===id);
  if (!q) return false;
  // Skipped questions are always considered answered (auto-filled)
  if (_shouldSkip(q)) return true;
  const a = answers[id];
  if (!a) return false;
  if (Array.isArray(a)) return a.length > 0;
  return true;
}

// Numeric answers update in place: re-rendering the wizard on every keystroke
// would destroy the input and steal focus.
function setNumberAnswer(id, raw) {
  const q = QUESTIONS.find(x => x.id === id);
  const lo = q.min || 1990, hi = q.max || 2050;
  const n = parseInt(raw, 10);
  const valid = raw !== '' && isFinite(n) && n >= lo && n <= hi;
  if (valid) answers[id] = n; else delete answers[id];
  _syncAnswers();
  scheduleSave();
  renderSidebar();
  const warn = document.getElementById('yearWarn_' + id);
  if (warn) warn.style.visibility = (raw !== '' && !valid) ? 'visible' : 'hidden';
  const btn = document.querySelector('.wizard-nav .btn-next');
  if (btn) btn.disabled = !hasAnswer(id);
}

function selectOption(id, val, multi) {
  if (multi) {
    let arr = Array.isArray(answers[id]) ? [...answers[id]] : [];
    if (val === 'none' || val === 'tbd') {
      arr = arr.includes(val) ? [] : [val];            // "None" / "Not sure" are exclusive
    } else {
      arr = arr.filter(v => v !== 'none' && v !== 'tbd'); // any real pick clears them
      if (arr.includes(val)) arr = arr.filter(v => v !== val);
      else arr.push(val);
    }
    answers[id] = arr;
  } else {
    answers[id] = val;
  }
  _syncAnswers();   // cascade: clear invalidated downstream answers, auto-fill single-option steps
  scheduleSave();
  renderWizard();
  renderSidebar();
}

function wizardNext() {
  if (!hasAnswer(QUESTIONS[currentWizardStep].id)) return;
  const next = _nextStep(currentWizardStep);
  if (next < QUESTIONS.length) {
    currentWizardStep = next;
    renderWizard();
    renderSidebar();
  } else {
    determineApplicableSections();
    saveData();
    showView('results');
  }
}

function wizardBack() {
  const prev = _prevStep(currentWizardStep);
  if (prev >= 0) {
    currentWizardStep = prev;
    renderWizard();
    renderSidebar();
  }
}

function resetWizard() {
  if (!confirm('Reset classification? Tracking data will be preserved.')) return;
  answers = {};
  currentWizardStep = 0;
  scheduleSave();
  showView('wizard');
}


function renderResults() {
  const applic = determineApplicableSections();
  const applicSecs = SECTIONS.filter(s => applic[s.sec] && applic[s.sec].applies);
  const counts = {'86':0,'1036':0,'1037':0,'1065':0,'1066':0};
  applicSecs.forEach(s => { if (s.part) counts[String(s.part)] = (counts[String(s.part)]||0) + 1; });

  const summaryHTML = `
    <div class="results-summary">
      <div class="sum-stat"><span class="sum-badge badge-86">${counts['86']||0} × Pt.86</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat"><span class="sum-badge badge-1036">${counts['1036']||0} × Pt.1036</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat"><span class="sum-badge badge-1037">${counts['1037']||0} × Pt.1037</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat"><span class="sum-badge badge-1065">${counts['1065']||0} × Pt.1065</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat"><span class="sum-badge badge-1066">${counts['1066']||0} × Pt.1066</span></div>
      <div class="sum-sep"></div>
      <div class="sum-stat" style="color:var(--text2);font-size:12px;"><strong>${applicSecs.length}</strong>&nbsp;applicable sections</div>
      <div class="project-end-wrap">
        <label>Project end:</label>
        <input type="date" value="${projectEnd}" onchange="projectEnd=this.value;scheduleSave()">
      </div>
    </div>`;

  const filterHTML = `
    <div class="filter-bar">
      <span class="filter-label">Status:</span>
      ${['all','green','yellow','red','unset'].map(f=>`<button class="filter-chip ${filterRYG===f?'active':''}" onclick="setFilter('ryg','${f}')">${f==='all'?'All':f==='green'?'On Schedule':f==='yellow'?'Needs Attention':f==='red'?'Attention Needed':'Unset'}</button>`).join('')}
      <span class="filter-label" style="margin-left:12px;">Part:</span>
      ${['all','86','1036','1037','1065','1066'].map(f=>`<button class="filter-chip ${filterPart===f?'active':''}" onclick="setFilter('part','${f}')">${f==='all'?'All':'Pt.'+f}</button>`).join('')}
    </div>`;

  const groups = [
    { key:'86',   label:'Part 86 — Legacy Criteria Pollutant Standards',  cls:'gh-86',   secs: SECTIONS.filter(s=>s.part===86) },
    { key:'1036', label:'Part 1036 — HD Engine Emission Standards',        cls:'gh-1036', secs: SECTIONS.filter(s=>s.part===1036) },
    { key:'1037', label:'Part 1037 — HD Vehicle GHG Standards',            cls:'gh-1037', secs: SECTIONS.filter(s=>s.part===1037) },
    { key:'1065', label:'Part 1065 — Engine-Testing Procedures',           cls:'gh-1065', secs: SECTIONS.filter(s=>s.part===1065) },
    { key:'1066', label:'Part 1066 — Vehicle-Testing Procedures',          cls:'gh-1066', secs: SECTIONS.filter(s=>s.part===1066) },
  ];

  let groupsHTML = '';
  for (const g of groups) {
    const visibleSecs = g.secs.filter(s => {
      const t = tracking[s.sec] || {};
      const ryg = t.ryg || 'unset';
      if (filterPart !== 'all' && filterPart !== g.key) return false;
      if (filterRYG !== 'all' && filterRYG !== ryg) return false;
      return true;
    });
    if (!visibleSecs.length && filterPart !== 'all') continue;
    const appl = g.secs.filter(s=>applic[s.sec]&&applic[s.sec].applies).length;
    const avgPct = appl ? Math.round(g.secs.filter(s=>applic[s.sec]&&applic[s.sec].applies).reduce((a,s)=>(a+(tracking[s.sec]?.pct||0)),0)/appl) : 0;

    groupsHTML += `
      <div class="section-group">
        <div class="group-header ${g.cls}" onclick="toggleGroup(this)">
          <span class="group-chevron">▼</span>
          <span class="group-title">${g.label}</span>
          <span class="group-count">${appl} applicable</span>
          <span class="group-pct">${avgPct}% avg</span>
        </div>
        <div class="group-body">
          ${visibleSecs.map(s => renderSectionCard(s, applic[s.sec])).join('')}
        </div>
      </div>`;
  }

  document.getElementById('view-results').innerHTML = summaryHTML + filterHTML + groupsHTML;
}

function renderSectionCard(s, appl) {
  const t = tracking[s.sec] || {};
  const ryg = t.ryg || 'unset';
  const pct = t.pct || 0;
  const isAppl = appl && appl.applies;
  const badges = [];
  if (s.mandatory) badges.push('<span class="qbadge qbadge-mand" title="Mandatory standard">Mandatory</span>');
  if (s.tests && s.tests.length) badges.push('<span class="qbadge qbadge-test" title="Test procedure required">Test</span>');
  if (s.forms && s.forms.length) badges.push('<span class="qbadge qbadge-form" title="Form/label required">Form</span>');
  if (s.vehDocs && s.vehDocs.length) badges.push('<span class="qbadge qbadge-doc" title="Documentation needed">Docs</span>');
  if (s.criteria && s.criteria.length) badges.push('<span class="qbadge qbadge-crit" title="Atomic acceptance criteria">Criteria</span>');
  const badgesHtml = isAppl && badges.length ? ('<span class="qbadges">' + badges.join('') + '</span>') : '';
  return `
    <div class="section-card" id="sec-${s.sec}" onclick="toggleSection('${s.sec}',event)">
      <div class="section-card-header">
        <div class="sec-pips"><div class="pip-dot ${ryg==='green'?'green':ryg==='yellow'?'yellow':ryg==='red'?'red':''}"></div></div>
        <div class="sec-num">§${s.sec}</div>
        <div class="sec-title">${s.title}</div>
        ${badgesHtml}
        ${!isAppl ? `<span class="sec-na-badge">N/A</span>` : `<span class="sec-pct-badge">${pct}%</span>`}
        <span class="sec-chevron">▶</span>
      </div>
      <div class="section-body" id="body-${s.sec}"></div>
    </div>`;
}

function toggleSection(sec, evt) {
  // Only respond if the click originated in the section card header (not inside body).
  // We check evt.target.closest('.section-card-header') which is stable even if body content
  // was re-rendered by other handlers running first.
  if (!evt || !evt.target.closest('.section-card-header')) return;
  const card = document.getElementById('sec-' + sec);
  if (!card) return;
  const isExp = card.classList.contains('expanded');
  card.classList.toggle('expanded', !isExp);
  if (!isExp) renderSectionBody(sec);
}

function toggleGroup(header) {
  header.classList.toggle('collapsed');
  const body = header.nextElementSibling;
  if (body) body.style.display = header.classList.contains('collapsed') ? 'none' : '';
}


function renderMTFPanel(s) {
  const tests = s.tests || [];
  const forms = s.forms || [];
  const vdocs = s.vehDocs || [];
  if (!tests.length && !forms.length && !vdocs.length) return '';
  const section = function(cls, label, items) {
    if (!items.length) {
      return '<div class="mtf-group ' + cls + '">'
        + '<div class="mtf-group-label"><span class="mtf-group-label-dot"></span>' + label + '</div>'
        + '<div class="mtf-empty">None specified</div>'
        + '</div>';
    }
    return '<div class="mtf-group ' + cls + '">'
      + '<div class="mtf-group-label"><span class="mtf-group-label-dot"></span>' + label + ' (' + items.length + ')</div>'
      + '<ul class="mtf-list">' + items.map(function(i) { return '<li>' + i + '</li>'; }).join('') + '</ul>'
      + '</div>';
  };
  let out = '<div class="mtf-panel"><div class="mtf-panel-title">Mandated Tests & Forms</div>';
  if (tests.length) out += section('mtf-group-tests', 'Required tests / procedures', tests);
  if (forms.length) out += section('mtf-group-forms', 'Required forms / labels', forms);
  if (vdocs.length) out += section('mtf-group-docs',  'Vehicle-specific documentation', vdocs);
  out += '</div>';
  return out;
}

function renderSectionBody(sec) {
  const s = SECTIONS.find(x=>x.sec===sec);
  if (!s) return;
  const applic = determineApplicableSections();
  const appl = applic[sec] || { applies: false, note: '' };
  ensureTracking(sec);
  const t = tracking[sec];

  const bodyEl = document.getElementById('body-' + sec);
  if (!bodyEl) return;

  const tags = (s.summary.tags||[]).map(tag => {
    const cls = tag.includes('Crash Avoidance')||tag.includes('Brakes')||tag.includes('Light Vehicle')?'tag-blue':
                tag.includes('Crash')||tag.includes('Ejection')?'tag-red':
                tag.includes('Post')||tag.includes('Fuel')||tag.includes('Fire')?'tag-amber':
                tag.includes('EV')||tag.includes('Hybrid')||tag.includes('LSV')?'tag-teal':
                tag.includes('Cert')||tag.includes('Stage')?'tag-indigo':'tag-grey';
    return `<span class="tag ${cls}">${tag}</span>`;
  }).join('');

  bodyEl.innerHTML = `
    <div class="reg-panel">
      <div class="apply-note ${appl.applies ? (appl.uncertain?'maybe':'applies') : 'na'}">${appl.applies ? (appl.uncertain?'? Possibly Applicable':'✓ Applicable') : '✗ Not Applicable'}${appl.note?': '+appl.note:''}</div>
      ${appl.advisory ? `<div class="apply-advisory">⚑ ${appl.advisory}</div>` : ''}
      <div class="reg-summary">
        <div class="reg-field"><div class="reg-field-label">What</div><div class="reg-field-val">${s.summary.what}</div></div>
        <div class="reg-field"><div class="reg-field-label">Who</div><div class="reg-field-val">${s.summary.who}</div></div>
        <div class="reg-field"><div class="reg-field-label">When</div><div class="reg-field-val">${s.summary.when}</div></div>
        <div class="reg-field"><div class="reg-field-label">Why it matters</div><div class="reg-field-val">${s.summary.why}</div></div>
      </div>
      <div class="tags-row">${tags}</div>
      ${s.conditions.length ? `<div class="small-section-head">Applicability Conditions</div>
        <ul class="cond-list">${s.conditions.map(c=>`<li>${c}</li>`).join('')}</ul>` : ''}
      <a class="ecfr-link" href="${s.ecfr}" target="_blank">↗ View on eCFR</a>
      ${renderMTFPanel(s)}
      ${s.subs && s.subs.length ? ('<div class="subsec-list"><div class="subsec-list-title"><span>Sub-sections (' + s.subs.length + ')</span><button class="subsec-clear-btn" onclick="clearSubChecks(\'' + sec + '\');event.stopPropagation()">Clear all</button></div><div id="subsec-list-' + sec + '">' + renderSubsecList(sec) + '</div></div>') : ''}
    </div>
    <div class="track-panel" id="track-${sec}">
      <div class="ryg-row">
        <button class="ryg-btn ${t.ryg==='green'?'green-active':''}" onclick="setRYG('${sec}','green')">🟢 On Schedule</button>
        <button class="ryg-btn ${t.ryg==='yellow'?'yellow-active':''}" onclick="setRYG('${sec}','yellow')">🟡 Needs Attention</button>
        <button class="ryg-btn ${t.ryg==='red'?'red-active':''}" onclick="setRYG('${sec}','red')">🔴 Attention Needed</button>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Owner</label><input class="form-input userlist-autocomplete" list="userlist-datalist" id="own-${sec}" value="${t.owner||''}" oninput="updateField('${sec}','owner',this.value)"></div>
        <div class="form-group"><label class="form-label">Start Date</label><input type="date" class="form-input" id="start-${sec}" value="${t.startdate||''}" oninput="updateField('${sec}','startdate',this.value)"></div>
        <div class="form-group"><label class="form-label">Due Date</label><input type="date" class="form-input" id="due-${sec}" value="${t.duedate||''}" oninput="updateField('${sec}','duedate',this.value)"></div>
      </div>
      <div class="pct-row">
        <label class="form-label" style="min-width:80px;margin:0">% Complete</label>
        <input type="range" min="0" max="100" value="${t.pct||0}" oninput="updateField('${sec}','pct',parseInt(this.value));document.getElementById('pct-val-${sec}').textContent=this.value+'%'">
        <span class="pct-val" id="pct-val-${sec}">${t.pct||0}%</span>
      </div>
      <div class="form-group full"><label class="form-label">Notes</label><textarea class="form-input" rows="3" oninput="updateField('${sec}','notes',this.value)">${t.notes||''}</textarea></div>
      <div class="docs-section">
        <div class="small-section-head">Documents</div>
        <div id="docs-${sec}">${(t.docs||[]).map((d,i)=>`<div class="doc-item"><span class="doc-name">${d}</span><button class="btn-del-doc" onclick="removeDoc('${sec}',${i})">✕</button></div>`).join('')}</div>
        <div class="add-doc-row"><input class="form-input" id="doc-input-${sec}" placeholder="Document name or link…"><button onclick="addDoc('${sec}')">+ Add</button></div>
      </div>
      ${s.deliverables && s.deliverables.length ? `
      <div class="deliv-section">
        <div class="deliv-section-header">
          <span class="deliv-section-title">Required Deliverables (${s.deliverables.length})</span>
        </div>
        <div id="deliv-list-${sec}">${renderDeliverables(sec)}</div>
      </div>` : ''}
      ${renderCriteria(sec)}
      <div class="subtasks-section">
        <div class="subtask-header">
          <span class="subtask-title">Additional Subtasks (${(t.subtasks||[]).length})</span>
          <button class="btn-add-sub" onclick="addSubtask('${sec}')">+ Add Subtask</button>
        </div>
        <div id="subs-${sec}">${renderSubtasks(sec, t.subtasks||[])}</div>
      </div>
      <div class="save-row">
        <span class="save-flash" id="flash-${sec}">Saved ✓</span>
        <button class="btn-save" onclick="saveSection('${sec}')">Save</button>
      </div>
    </div>`;
}

function renderSubtasks(sec, subtasks) {
  return subtasks.map((st,i) => `
    <div class="subtask-item">
      <input type="checkbox" class="sub-check" ${st.done?'checked':''} onchange="toggleSubtask('${sec}',${i},this.checked)">
      <input class="sub-text ${st.done?'done-text':''}" value="${st.text||''}" placeholder="Subtask…" oninput="updateSubtask('${sec}',${i},'text',this.value)">
      <input list="userlist-datalist" class="userlist-autocomplete sub-input" value="${st.assignee||''}" placeholder="Assignee" oninput="updateSubtask('${sec}',${i},'assignee',this.value)">
      <input type="date" class="sub-input" value="${st.startdate||''}" oninput="updateSubtask('${sec}',${i},'startdate',this.value)">
      <input type="date" class="sub-input" value="${st.duedate||''}" oninput="updateSubtask('${sec}',${i},'duedate',this.value)">
      <button class="btn-del-sub" onclick="deleteSubtask('${sec}',${i})">✕</button>
    </div>`).join('');
}

// ══════════════════════════════════════════════════════════
//  TRACKING OPERATIONS
// ══════════════════════════════════════════════════════════


function filterSubs(subs) {
  // EPA: all subs applicable
  return Array.isArray(subs) ? subs : [];
}

function ensureDeliverables(sec) {
  ensureTracking(sec);
  const section = SECTIONS.find(x => x.sec === sec);
  if (!section || !section.deliverables) return;
  const delivs = tracking[sec].deliverables;
  while (delivs.length < section.deliverables.length) {
    delivs.push({ done: false, assignee: '', startdate: '', duedate: '' });
  }
}

function renderDeliverables(sec) {
  const s = SECTIONS.find(x => x.sec === sec);
  if (!s || !s.deliverables || !s.deliverables.length) return '';
  ensureDeliverables(sec);
  const delivs = tracking[sec].deliverables;
  const total = s.deliverables.length;
  const done = delivs.filter(function(d) { return d && d.done; }).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  let out = '<div class="deliv-progress-row">'
    + '<div class="subsec-progress-bar-bg"><div class="subsec-progress-bar-fill" style="width:' + pct + '%"></div></div>'
    + '<span class="subsec-progress-label">' + done + '/' + total + '</span>'
    + '</div>';
  out += '<div class="deliv-header-row"><span></span><span>Deliverable</span><span>Assignee</span><span>Start</span><span>Due</span></div>';
  s.deliverables.forEach(function(dt, i) {
    const d = delivs[i] || { done: false, assignee: '', startdate: '', duedate: '' };
    out += '<div class="deliv-item">'
      + '<input type="checkbox" ' + (d.done ? 'checked' : '') + ' onchange="toggleDeliv(\'' + sec + '\',' + i + ',this.checked)">'
      + '<span class="deliv-text ' + (d.done ? 'done' : '') + '">' + dt + '</span>'
      + '<input list="userlist-datalist" class="sub-input userlist-autocomplete" value="' + (d.assignee || '') + '" placeholder="Assignee" oninput="updateDeliv(\'' + sec + '\',' + i + ',\'assignee\',this.value)">'
      + '<input type="date" class="sub-input" value="' + (d.startdate || '') + '" oninput="updateDeliv(\'' + sec + '\',' + i + ',\'startdate\',this.value)">'
      + '<input type="date" class="sub-input" value="' + (d.duedate || '') + '" oninput="updateDeliv(\'' + sec + '\',' + i + ',\'duedate\',this.value)">'
      + '</div>';
  });
  return out;
}

function toggleDeliv(sec, idx, checked) {
  ensureDeliverables(sec);
  tracking[sec].deliverables[idx].done = checked;
  scheduleSave();
  const el = document.getElementById('deliv-list-' + sec);
  if (el) el.innerHTML = renderDeliverables(sec);
}

function updateDeliv(sec, idx, field, val) {
  ensureDeliverables(sec);
  tracking[sec].deliverables[idx][field] = val;
  scheduleSave();
}

function renderSubsecList(sec) {
  const s = SECTIONS.find(x => x.sec === sec);
  if (!s || !s.subs || !s.subs.length) return '';
  ensureTracking(sec);
  const filtered = filterSubs(s.subs);
  if (!filtered.length) return '<div style="font-size:11px;color:var(--text3);padding:4px 0">No applicable sub-sections for selected vehicle configuration.</div>';
  const checks = tracking[sec].subChecks || {};
  const total = filtered.length;
  const done = filtered.filter(function(sub) { return !!checks[sub]; }).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  let out = '<div class="subsec-progress-row">'
    + '<div class="subsec-progress-bar-bg"><div class="subsec-progress-bar-fill" style="width:' + pct + '%"></div></div>'
    + '<span class="subsec-progress-label">' + done + '/' + total + '</span>'
    + '</div>';
  filtered.forEach(function(sub) {
    const chk = !!checks[sub];
    const subEsc = sub.replace(/'/g, "\\'");
    out += '<div class="subsec-item ' + (chk ? 'checked' : '') + '" onclick="toggleSubCheck(\'' + sec + '\',\'' + subEsc + '\')">'
      + '<input type="checkbox" ' + (chk ? 'checked' : '') + ' onclick="event.stopPropagation();toggleSubCheck(\'' + sec + '\',\'' + subEsc + '\')">'
      + '<label>' + sub + '</label>'
      + '</div>';
  });
  return out;
}

function ensureTracking(sec) {
  if (!tracking[sec]) tracking[sec] = { ryg:'unset', owner:'', startdate:'', duedate:'', pct:0, notes:'', docs:[], subtasks:[], deliverables:[], subChecks:{} };
  const t = tracking[sec];
  // Migration from old field names
  if (t.due !== undefined && t.duedate === undefined) { t.duedate = t.due; }
  if (t.enddate !== undefined && t.startdate === undefined) { t.startdate = t.enddate; }
  if (t.startdate === undefined) t.startdate = '';
  if (t.duedate === undefined) t.duedate = '';
  if (!t.subChecks) t.subChecks = {};
  if (!t.deliverables) t.deliverables = [];
  if (!t.subtasks) t.subtasks = [];
  if (!t.docs) t.docs = [];
  // Migrate subtask enddate -> duedate
  t.subtasks.forEach(st => {
    if (st.enddate !== undefined && st.duedate === undefined) st.duedate = st.enddate;
    if (st.startdate === undefined) st.startdate = '';
    if (st.duedate === undefined) st.duedate = '';
  });
  // Sync deliverables array length with section data
  const section = SECTIONS.find(x => x.sec === sec);
  if (section && section.deliverables) {
    while (t.deliverables.length < section.deliverables.length) {
      t.deliverables.push({ done: false, assignee: '', startdate: '', duedate: '' });
    }
  }
  // Migrate subChecks from index-based to text-based keys
  if (section && section.subs) {
    const keys = Object.keys(t.subChecks);
    if (keys.length && /^\d+$/.test(keys[0])) {
      const newChecks = {};
      keys.forEach(k => {
        const idx = parseInt(k);
        if (section.subs[idx]) newChecks[section.subs[idx]] = t.subChecks[k];
      });
      t.subChecks = newChecks;
    }
  }
}

// ══════════════════════════════════════════════════════════
function ensureCriteria(sec) {
  ensureTracking(sec);
  if (!tracking[sec].criteria) tracking[sec].criteria = {};
}

function _tagState(t, part) {
  const cyc = _effectiveCycle(part);   // null when engine cycle unknown
  if (t === 'ci_diesel') return cyc === null ? null : cyc === 'ci_diesel';
  if (t === 'si')        return cyc === null ? null : cyc === 'si';
  if (t === 'bev')       return _eqA('q_engine','bev');
  if (t === 'hybrid')    return _spHas('hybrid');
  if (t === 'glider')    return _spHas('glider');
  if (t === 'abt')       return _spHas('abt');
  if (t === 'off_cycle') return _spHas('off_cycle');
  if (t === 'small_mfr') return _spHas('small_mfr');
  if (t === 'cng_lng_lpg') return _eqA('q_fuel','cng_lng_lpg');
  if (t === 'hydrogen')  return _orTri(_eqA('q_fuel','hydrogen'), _eqA('q_fuel','fcev'));
  if (t === 'fcev')      return _eqA('q_fuel','fcev');
  if (t === 'incomplete') return _eqA('q_complete','incomplete');
  if (t === 'le8500')    return _eqA('q_gvwr','le8500');
  if (t === 'gt33000')   return _eqA('q_gvwr','gt33000');
  if (t === 'my2031plus') return _myAtLeast(2031);
  if (t === 'motorcycle') return _eqA('q_vtype','motorcycle');
  if (t === 'voc_tractor') return _eqA('q_vtype','voc_tractor');
  return true;
}
// Unknown (null) keeps the criterion visible — never hide a requirement on a TBD answer.
function filterCriteria(crits, sec) {
  if (!crits) return [];
  const part = sec && sec.part;
  return crits.filter(c => !c.tag || _tagState(c.tag, part) !== false);
}

function _critStateClass(state) {
  return ({pass:'crit-pass', fail:'crit-fail', prog:'crit-prog', na:'crit-na'})[state] || '';
}

function _critProgressColor(stats) {
  if (stats.fail > 0) return 'red';
  if (stats.prog > 0 || stats.unset > 0) return 'yellow';
  if (stats.pass > 0) return 'green';
  return 'yellow';
}

function _critStats(crits, secKey) {
  const st = (tracking[secKey] || {}).criteria || {};
  let pass = 0, fail = 0, prog = 0, na = 0, unset = 0;
  crits.forEach(function(c) {
    const v = (st[c.id] || {}).state;
    if (v === 'pass') pass++;
    else if (v === 'fail') fail++;
    else if (v === 'prog') prog++;
    else if (v === 'na') na++;
    else unset++;
  });
  const total = crits.length;
  const evaluated = pass + fail + na;
  const pctPass = total ? Math.round(pass / total * 100) : 0;
  return {pass, fail, prog, na, unset, total, evaluated, pctPass};
}

function _suggestRYG(stats) {
  // Auto-rollup logic per spec
  if (stats.fail > 0) return 'red';
  if (stats.prog > 0) return 'yellow';
  // Treat NA as "doesn't count" — only judge by pass vs unset of evaluable
  const evaluable = stats.total - stats.na;
  if (evaluable === 0) return null;  // all N/A → no suggestion
  if (stats.pass === evaluable) return 'green';
  if (stats.unset > 0 && stats.pass > 0) return 'yellow';
  if (stats.unset === evaluable) return null;  // nothing started yet
  return 'yellow';
}


// Render a single criterion item (extracted so it can be updated surgically without full re-render).
function renderCritItem(sec, c, st) {
  const state = (st && st.state) || 'unset';
  const stateClass = _critStateClass(state);
  const cidEsc = c.id.replace(/'/g, "\\'");
  const safeId = 'crit-item-' + sec + '-' + c.id.replace(/[^a-zA-Z0-9_-]/g, '_');
  st = st || {};

  let out = '<div class="crit-item ' + stateClass + '" id="' + safeId + '">';
  out += '<div class="crit-item-row1">';
  out += '<div class="crit-id-ref">' + c.id + '<br>' + (c.ref || '') + '</div>';
  out += '<div class="crit-text">' + c.text + '</div>';
  out += '</div>';
  out += '<div class="crit-state-row">';
  [['pass','Pass'], ['fail','Fail'], ['prog','In Progress'], ['na','N/A']].forEach(function(b) {
    const active = state === b[0] ? 'crit-active-' + b[0] : '';
    out += '<button class="crit-state-btn ' + active + '" onclick="setCritState(\'' + sec + '\',\'' + cidEsc + '\',\'' + b[0] + '\')">' + b[1] + '</button>';
  });
  out += '</div>';
  out += '<div class="crit-meta-row">';
  out += '<input class="crit-meta-input userlist-autocomplete" list="userlist-datalist" placeholder="Tester / Engineer" value="' + (st.tester || '') + '" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'tester\',this.value)">';
  out += '<input type="date" class="crit-meta-input" value="' + (st.date || '') + '" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'date\',this.value)">';
  out += '<input class="crit-meta-input userlist-autocomplete" list="userlist-datalist" placeholder="Assignee" value="' + (st.assignee || '') + '" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'assignee\',this.value)">';
  out += '</div>';
  out += '<input class="crit-evidence-input" placeholder="Evidence: file path / report ID / link" value="' + (st.evidence || '') + '" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'evidence\',this.value)">';
  out += '<textarea class="crit-note-input" placeholder="Note / observation" oninput="updateCritField(\'' + sec + '\',\'' + cidEsc + '\',\'note\',this.value)">' + (st.note || '') + '</textarea>';
  out += '</div>';
  return out;
}

// Update the stats strip + progress bar + rollup banner surgically.
function _refreshCritStats(sec) {
  const s = SECTIONS.find(x => x.sec === sec);
  if (!s || !s.criteria) return;
  const filtered = filterCriteria(s.criteria, s);
  const stats = _critStats(filtered, sec);
  // Progress bar fill
  const progFill = document.querySelector('#sec-' + sec + ' .crit-progress-bar-fill');
  if (progFill) {
    progFill.className = 'crit-progress-bar-fill ' + _critProgressColor(stats);
    progFill.style.width = stats.pctPass + '%';
  }
  const progLabel = document.querySelector('#sec-' + sec + ' .crit-progress-label');
  if (progLabel) progLabel.textContent = stats.pass + '/' + stats.total + ' pass';
  // Stats strip
  const statsEl = document.querySelector('#sec-' + sec + ' .crit-stats');
  if (statsEl) {
    let html = '';
    if (stats.pass) html += '<span class="crit-stat pass-stat"><span class="crit-stat-dot"></span>' + stats.pass + ' pass</span>';
    if (stats.fail) html += '<span class="crit-stat fail-stat"><span class="crit-stat-dot"></span>' + stats.fail + ' fail</span>';
    if (stats.prog) html += '<span class="crit-stat prog-stat"><span class="crit-stat-dot"></span>' + stats.prog + ' in progress</span>';
    if (stats.na)   html += '<span class="crit-stat na-stat"><span class="crit-stat-dot"></span>' + stats.na + ' N/A</span>';
    if (stats.unset) html += '<span class="crit-stat unset-stat"><span class="crit-stat-dot"></span>' + stats.unset + ' unset</span>';
    statsEl.innerHTML = html;
  }
  // Rollup banner — find or create
  const rygSuggestion = _suggestRYG(stats);
  const currentRyg = (tracking[sec] || {}).ryg || 'unset';
  const showRollup = rygSuggestion && rygSuggestion !== currentRyg;
  const critSection = document.querySelector('#sec-' + sec + ' .crit-section');
  if (critSection) {
    const existing = critSection.querySelector('.crit-rollup-suggest');
    if (showRollup) {
      const labels = {green:'On Schedule', yellow:'Needs Attention', red:'Attention Needed'};
      const bannerHTML = '<div class="crit-rollup-suggest"><span class="crit-rollup-text">Criteria pattern suggests <strong>' + labels[rygSuggestion] + '</strong>. Current: ' + (currentRyg === 'unset' ? 'unset' : labels[currentRyg]) + '.</span><button onclick="setRYG(\'' + sec + '\',\'' + rygSuggestion + '\');_refreshCritStats(\'' + sec + '\');_refreshRYGButtons(\'' + sec + '\')">Apply</button></div>';
      if (existing) existing.outerHTML = bannerHTML;
      else critSection.insertAdjacentHTML('beforeend', bannerHTML);
    } else if (existing) {
      existing.remove();
    }
  }
}

function _refreshRYGButtons(sec) {
  const ryg = (tracking[sec] || {}).ryg || 'unset';
  ['green','yellow','red'].forEach(function(c) {
    const btn = document.querySelector('#sec-' + sec + ' .ryg-btn.btn-' + c);
    if (btn) btn.classList.toggle(c + '-active', ryg === c);
  });
  // Also update the pip dot in the card header
  const pip = document.querySelector('#sec-' + sec + ' > .section-card-header .pip-dot');
  if (pip) pip.className = 'pip-dot ' + (ryg === 'green' ? 'green' : ryg === 'yellow' ? 'yellow' : ryg === 'red' ? 'red' : '');
}

function renderCriteria(sec) {
  const s = SECTIONS.find(x => x.sec === sec);
  if (!s || !Array.isArray(s.criteria) || !s.criteria.length) return '';
  ensureCriteria(sec);

  const filtered = filterCriteria(s.criteria, s);
  if (!filtered.length) {
    return '<div class="crit-section"><div class="crit-section-header"><span class="crit-section-title">Acceptance Criteria</span></div><div class="crit-empty">No applicable acceptance criteria for selected vehicle configuration.</div></div>';
  }

  const stats = _critStats(filtered, sec);
  const rygSuggestion = _suggestRYG(stats);
  const currentRyg = (tracking[sec] || {}).ryg || 'unset';
  const showRollup = rygSuggestion && rygSuggestion !== currentRyg;

  let out = '<div class="crit-section">';
  out += '<div class="crit-section-header"><span class="crit-section-title">Acceptance Criteria (' + filtered.length + ')</span></div>';

  // Progress bar
  const progColor = _critProgressColor(stats);
  out += '<div class="crit-progress-row">';
  out += '<div class="crit-progress-bar-bg"><div class="crit-progress-bar-fill ' + progColor + '" style="width:' + stats.pctPass + '%"></div></div>';
  out += '<span class="crit-progress-label">' + stats.pass + '/' + stats.total + ' pass</span>';
  out += '</div>';

  // Stats strip
  out += '<div class="crit-stats">';
  if (stats.pass) out += '<span class="crit-stat pass-stat"><span class="crit-stat-dot"></span>' + stats.pass + ' pass</span>';
  if (stats.fail) out += '<span class="crit-stat fail-stat"><span class="crit-stat-dot"></span>' + stats.fail + ' fail</span>';
  if (stats.prog) out += '<span class="crit-stat prog-stat"><span class="crit-stat-dot"></span>' + stats.prog + ' in progress</span>';
  if (stats.na)   out += '<span class="crit-stat na-stat"><span class="crit-stat-dot"></span>' + stats.na + ' N/A</span>';
  if (stats.unset) out += '<span class="crit-stat unset-stat"><span class="crit-stat-dot"></span>' + stats.unset + ' unset</span>';
  out += '</div>';

  // Items
  const stMap = (tracking[sec] || {}).criteria || {};
  filtered.forEach(function(c) {
    const st = stMap[c.id] || {};
    const state = st.state || 'unset';
    const stateClass = _critStateClass(state);
    const cidEsc = c.id.replace(/'/g, "\\'");

    out += renderCritItem(sec, c, st);
  });

  // Rollup suggestion banner
  if (showRollup) {
    out += '<div class="crit-rollup-suggest">';
    out += '<span class="crit-rollup-text">Criteria pattern suggests <strong>' + ({green:'On Schedule',yellow:'Needs Attention',red:'Attention Needed'})[rygSuggestion] + '</strong>. Current: ' + (currentRyg === 'unset' ? 'unset' : ({green:'On Schedule',yellow:'Needs Attention',red:'Attention Needed'})[currentRyg]) + '.</span>';
    out += '<button onclick="event.stopPropagation();setRYG(\'' + sec + '\',\'' + rygSuggestion + '\');_refreshCritStats(\'' + sec + '\');_refreshRYGButtons(\'' + sec + '\')">Apply</button>';
    out += '</div>';
  }

  out += '</div>';
  return out;
}

function setCritState(sec, cid, state) {
  ensureCriteria(sec);
  if (!tracking[sec].criteria[cid]) tracking[sec].criteria[cid] = {};
  // Toggle: clicking same state clears it
  if (tracking[sec].criteria[cid].state === state) {
    delete tracking[sec].criteria[cid].state;
  } else {
    tracking[sec].criteria[cid].state = state;
  }
  scheduleSave();
  // Surgical update — just this criterion's item and the section stats
  const card = document.getElementById('sec-' + sec);
  if (!card || !card.classList.contains('expanded')) return;
  // Capture scroll position as a safety net in case the DOM swap perturbs it
  const scrollContainer = document.getElementById('content') || document.scrollingElement;
  const savedScroll = scrollContainer ? scrollContainer.scrollTop : 0;
  const safeId = 'crit-item-' + sec + '-' + cid.replace(/[^a-zA-Z0-9_-]/g, '_');
  const itemEl = document.getElementById(safeId);
  if (itemEl) {
    const s = SECTIONS.find(x => x.sec === sec);
    const c = s.criteria.find(x => x.id === cid);
    const st = tracking[sec].criteria[cid] || {};
    itemEl.outerHTML = renderCritItem(sec, c, st);
  }
  _refreshCritStats(sec);
  // Restore scroll if it shifted
  if (scrollContainer && scrollContainer.scrollTop !== savedScroll) {
    scrollContainer.scrollTop = savedScroll;
  }
}

function updateCritField(sec, cid, field, val) {
  ensureCriteria(sec);
  if (!tracking[sec].criteria[cid]) tracking[sec].criteria[cid] = {};
  tracking[sec].criteria[cid][field] = val;
  scheduleSave();
}



// ══════════════════════════════════════════════════════════
//  USERS — directory of named owners with auto-initials
// ══════════════════════════════════════════════════════════
function _computeInitials(name) {
  if (!name) return '—';
  const parts = name.trim().split(/\s+/);
  if (parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[0][0] + parts[parts.length-1][0]).toUpperCase();
}

function _uniqueUserId() {
  let n = 1;
  while (users.find(u => u.id === 'user-' + n)) n++;
  return 'user-' + n;
}

function addUser(name, role) {
  const trimmedName = (name || '').trim();
  if (!trimmedName) return false;
  const u = {
    id: _uniqueUserId(),
    name: trimmedName,
    role: (role || '').trim(),
    initials: _computeInitials(trimmedName)
  };
  users.push(u);
  scheduleSave();
  renderUserDatalist();
  return true;
}

function deleteUser(uid) {
  if (!confirm('Delete this user? Existing assignments referring to their name will remain as text but no longer auto-suggest.')) return;
  users = users.filter(u => u.id !== uid);
  scheduleSave();
  renderUsersView();
  renderUserDatalist();
}

function updateUserField(uid, field, val) {
  const u = users.find(x => x.id === uid);
  if (!u) return;
  u[field] = val;
  // Recompute initials if name changed AND initials looked auto-generated
  if (field === 'name' && (!u.initialsManual || u.initials === _computeInitials(u._prevName || ''))) {
    u.initials = _computeInitials(val);
  }
  if (field === 'initials') {
    u.initialsManual = true;
  }
  u._prevName = u.name;
  scheduleSave();
  renderUserDatalist();
  // Refresh the avatar for this row (surgical)
  const avatarEl = document.querySelector('[data-user-avatar="' + uid + '"]');
  if (avatarEl) avatarEl.textContent = u.initials;
}

function _migrateLegacyAssignees() {
  // Collect every unique non-empty assignee string from existing tracking data
  const found = new Set();
  Object.keys(tracking).forEach(sec => {
    const t = tracking[sec];
    if (t.owner && t.owner.trim()) found.add(t.owner.trim());
    (t.deliverables || []).forEach(d => { if (d && d.assignee && d.assignee.trim()) found.add(d.assignee.trim()); });
    (t.subtasks || []).forEach(s => { if (s && s.assignee && s.assignee.trim()) found.add(s.assignee.trim()); });
    if (t.criteria) {
      Object.values(t.criteria).forEach(c => {
        if (c.assignee && c.assignee.trim()) found.add(c.assignee.trim());
        if (c.tester && c.tester.trim()) found.add(c.tester.trim());
      });
    }
  });
  if (!found.size) return;
  found.forEach(name => addUser(name, ''));
  console.log('Migrated ' + found.size + ' legacy assignees to user list.');
}

function renderUserDatalist() {
  const dl = document.getElementById('userlist-datalist');
  if (!dl) return;
  dl.innerHTML = users.map(u => {
    const label = u.role ? u.name + ' — ' + u.role : u.name;
    return '<option value="' + u.name.replace(/"/g, '&quot;') + '" label="' + label.replace(/"/g, '&quot;') + '">';
  }).join('');
}

function renderUsersView() {
  const view = document.getElementById('view-users');
  if (!view) return;
  const subEl = document.getElementById('topbar-sub');
  if (subEl) subEl.textContent = 'User directory';

  let html = '<div class="users-view-wrap">';
  html += '<h2>Users</h2>';
  html += '<div class="users-count-info">' + users.length + ' user' + (users.length === 1 ? '' : 's') + '. Names autocomplete in every assignee/owner field across the app.</div>';

  // Add row
  html += '<div class="users-add-row">';
  html += '<div><label>Name</label><input id="new-user-name" placeholder="Full name"></div>';
  html += '<div><label>Role</label><input id="new-user-role" placeholder="Compliance Engineer"></div>';
  html += '<div><label>Initials (auto)</label><input id="new-user-initials" placeholder="auto"></div>';
  html += '<button class="btn-add-user" onclick="(function(){var n=document.getElementById(\'new-user-name\').value;var r=document.getElementById(\'new-user-role\').value;var i=document.getElementById(\'new-user-initials\').value;if(addUser(n,r)){if(i&&i.trim()){var u=users[users.length-1];u.initials=i.trim().toUpperCase();u.initialsManual=true;scheduleSave();}document.getElementById(\'new-user-name\').value=\'\';document.getElementById(\'new-user-role\').value=\'\';document.getElementById(\'new-user-initials\').value=\'\';renderUsersView();renderUserDatalist();}})()">+ Add User</button>';
  html += '</div>';

  // Table
  if (!users.length) {
    html += '<div class="users-empty">No users yet. Add one above to get started.</div>';
  } else {
    html += '<table class="users-table"><thead><tr>';
    html += '<th style="width:50px"></th><th>Name</th><th>Role</th><th style="width:90px">Initials</th><th style="width:120px">Assignments</th><th style="width:60px"></th>';
    html += '</tr></thead><tbody>';
    users.forEach(u => {
      const assignCount = _countAssignmentsForUser(u.name);
      html += '<tr>';
      html += '<td><div class="user-avatar-tag" data-user-avatar="' + u.id + '">' + u.initials + '</div></td>';
      html += '<td><input value="' + (u.name || '').replace(/"/g, '&quot;') + '" oninput="updateUserField(\'' + u.id + '\',\'name\',this.value)"></td>';
      html += '<td><input value="' + (u.role || '').replace(/"/g, '&quot;') + '" oninput="updateUserField(\'' + u.id + '\',\'role\',this.value)" placeholder="(no role)"></td>';
      html += '<td><input value="' + (u.initials || '').replace(/"/g, '&quot;') + '" oninput="updateUserField(\'' + u.id + '\',\'initials\',this.value)" maxlength="3" style="text-align:center;font-family:var(--mono)"></td>';
      html += '<td style="font-family:var(--mono);font-size:12px;color:var(--text2)">' + assignCount + ' item' + (assignCount === 1 ? '' : 's') + '</td>';
      html += '<td><button class="btn-del-user" onclick="deleteUser(\'' + u.id + '\')">Delete</button></td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div>';
  view.innerHTML = html;
  renderUserDatalist();
}

function _countAssignmentsForUser(name) {
  if (!name) return 0;
  let n = 0;
  Object.keys(tracking).forEach(sec => {
    const t = tracking[sec];
    if (t.owner === name) n++;
    (t.deliverables || []).forEach(d => { if (d && d.assignee === name) n++; });
    (t.subtasks || []).forEach(s => { if (s && s.assignee === name) n++; });
    if (t.criteria) {
      Object.values(t.criteria).forEach(c => {
        if (c.assignee === name) n++;
        if (c.tester === name) n++;
      });
    }
  });
  return n;
}

// Determine which forms are required for the currently classified vehicle.
function _formState(form) {
  const k = form.applies;
  if (k === 'all') return true;
  if (k === 'optional') return null;
  // HD engine certification forms: engine path only, and a ZEV has no engine
  if (k === 'engine_mfr') return _andTri(_enginePathState(), _neA('q_engine','bev'));
  // HD vehicle (Part 1037) forms: heavy-duty vehicles only
  if (k === 'vehicle_mfr') return _hdVehicleState();
  if (k === 'abt') return _spHas('abt');
  if (k === 'glider') return _spHas('glider');
  if (k === 'small_mfr') return _spHas('small_mfr');
  if (k === 'off_cycle') return _spHas('off_cycle');
  if (k === 'hybrid') return _orTri(_spHas('hybrid'), _eqA('q_fuel','fcev'));
  // CI-diesel engine forms presuppose the HD engine path
  if (k === 'ci_diesel') return _andTri(_enginePathState(), _eqA('q_engine','ci_diesel'));
  if (k === 'incomplete') return _eqA('q_complete','incomplete');
  if (k === 'tractor_voc') {
    const v = answers.q_vtype;
    return _known(v) ? ['tractor','vocational','voc_tractor','custom_chassis'].includes(v) : null;
  }
  return true;
}
function _formApplies(form) { return _formState(form) === true; }

function _formMaybe(form) { return _formState(form) === null; }

function renderFormsView() {
  const view = document.getElementById('view-forms');
  if (!view) return;
  const subEl = document.getElementById('topbar-sub');
  if (subEl) subEl.textContent = 'Manufacturer forms & filings';

  const classified = classifyComplete();

  html += '<div style="font-size:12px;color:var(--text3);margin-bottom:18px;">EPA submission requirements under 40 CFR Parts 86, 1036, 1037, 1065 and 1066. ';
  if (classified) html += 'Highlighted rows are required for your classified vehicle.';
  else html += 'Complete the classification wizard to highlight forms required for your vehicle.';
  html += '</div>';

  // Count required
  let reqCount = 0, maybeCount = 0;
  MFR_FORMS.forEach(f => { if (classified && _formApplies(f)) reqCount++; else if (_formMaybe(f)) maybeCount++; });
  if (classified) {
    html += '<div class="forms-summary">';
    html += '<div class="forms-stat-box"><div class="forms-stat-label">Required</div><div class="forms-stat-val req">' + reqCount + '</div></div>';
    html += '<div class="forms-stat-box"><div class="forms-stat-label">Conditional</div><div class="forms-stat-val maybe">' + maybeCount + '</div></div>';
    html += '<div class="forms-stat-box"><div class="forms-stat-label">Total Forms</div><div class="forms-stat-val">' + MFR_FORMS.length + '</div></div>';
    html += '</div>';

    html += '<div class="forms-filter-row">';
    html += '<button class="forms-filter-btn ' + (formsFilter==='all'?'active':'') + '" onclick="setFormsFilter(\'all\')">All Forms</button>';
    html += '<button class="forms-filter-btn ' + (formsFilter==='required'?'active':'') + '" onclick="setFormsFilter(\'required\')">Required Only</button>';
    html += '</div>';
  }

  // Group forms by category
  const cats = {};
  MFR_FORMS.forEach(f => { if (!cats[f.cat]) cats[f.cat] = []; cats[f.cat].push(f); });
  Object.keys(cats).forEach(cat => {
    const formsInCat = cats[cat].filter(f => {
      if (formsFilter === 'required' && classified) return _formApplies(f);
      return true;
    });
    if (!formsInCat.length) return;
    html += '<div class="forms-cat">';
    html += '<div class="forms-cat-title">' + cat + '</div>';
    formsInCat.forEach(f => {
      const required = classified && _formApplies(f);
      const maybe = _formMaybe(f);
      const cls = required ? 'form-card required' : (maybe ? 'form-card maybe' : 'form-card');
      html += '<div class="' + cls + '">';
      html += '<div class="form-card-head">';
      html += '<span class="form-num">#' + f.num + '</span>';
      html += '<span class="form-name">' + f.name + '</span>';
      if (required) html += '<span class="form-badge req-badge">Required</span>';
      else if (maybe) html += '<span class="form-badge maybe-badge">Conditional</span>';
      html += '</div>';
      html += '<div class="form-card-body">';
      html += '<div class="form-field"><span class="form-field-label">Basis</span> ' + f.basis + '</div>';
      html += '<div class="form-field"><span class="form-field-label">Who files</span> ' + f.who + '</div>';
      html += '<div class="form-field"><span class="form-field-label">When</span> ' + f.when + '</div>';
      html += '<div class="form-field"><span class="form-field-label">How</span> ' + f.how + '</div>';
      html += '<div class="form-field form-notes">' + f.notes + '</div>';
      html += '</div>';
      html += '</div>';
    });
    html += '</div>';
  });

  // Filing deadlines section
  html += '<h2 style="font-size:16px;font-weight:700;margin:28px 0 6px;">Key Filing Deadlines & Triggers</h2>';
  html += '<div style="font-size:12px;color:var(--text3);margin-bottom:14px;">Time-sensitive obligations sorted by urgency.</div>';
  // Sort: CRITICAL, ONGOING, ONE-TIME, PERIODIC
  const urgencyOrder = { 'CRITICAL': 0, 'ONGOING': 1, 'ONE-TIME': 2, 'PERIODIC': 3 };
  const sortedDeadlines = FILING_DEADLINES.slice().sort((a,b) => (urgencyOrder[a.urgency]||9) - (urgencyOrder[b.urgency]||9));
  html += '<div class="deadlines-list">';
  sortedDeadlines.forEach(d => {
    html += '<div class="deadline-card urgency-' + d.urgency.toLowerCase().replace(/[^a-z]/g,'') + '">';
    html += '<div class="deadline-head">';
    html += '<span class="deadline-urgency">' + d.urgency + '</span>';
    html += '<span class="deadline-name">' + d.name + '</span>';
    html += '</div>';
    html += '<div class="deadline-body">';
    html += '<div class="deadline-field"><span class="form-field-label">Trigger</span> ' + d.trigger + '</div>';
    html += '<div class="deadline-field"><span class="form-field-label">Deadline</span> <strong>' + d.deadline + '</strong></div>';
    html += '<div class="deadline-field"><span class="form-field-label">Basis</span> ' + d.basis + '</div>';
    html += '<div class="deadline-field deadline-consequence">⚠ ' + d.consequence + '</div>';
    html += '</div>';
    html += '</div>';
  });
  html += '</div>';

  html += '</div>';
  view.innerHTML = html;
}

function setFormsFilter(f) {
  formsFilter = f;
  renderFormsView();
}

function _daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d.getTime())) return null;
  const today = new Date();
  today.setHours(0,0,0,0);
  return Math.floor((d - today) / (1000 * 60 * 60 * 24));
}

function _bucketForDays(days) {
  if (days === null) return 'nodate';
  if (days < 0) return 'overdue';
  if (days <= 7) return 'week';
  if (days <= 30) return 'month';
  return 'future';
}

function _initials(name) {
  if (!name) return '—';
  return name.split(/\s+/).slice(0,2).map(p => p[0]||'').join('').toUpperCase() || '—';
}

function _collectOwnerItems() {
  // Returns { ownerName: [{type, sec, title, dueDate, status, item}, ...] }
  const applic = classifyComplete()
    ? determineApplicableSections() : {};
  const owners = {};
  const add = (name, item) => {
    const k = name && name.trim() ? name.trim() : '(Unassigned)';
    if (!owners[k]) owners[k] = [];
    owners[k].push(item);
  };
  SECTIONS.forEach(s => {
    const a = applic[s.sec];
    if (!a || !a.applies) return;
    const t = tracking[s.sec];
    if (!t) return;
    // Section-level
    if (t.owner || t.duedate || t.startdate) {
      add(t.owner, {
        type: 'Section', sec: s.sec, title: s.title,
        dueDate: t.duedate || '', startDate: t.startdate || '',
        status: t.ryg || 'unset', pct: t.pct || 0,
        owner: t.owner || ''
      });
    }
    // Deliverable-level
    (s.deliverables || []).forEach((dt, i) => {
      const d = (t.deliverables || [])[i];
      if (!d) return;
      if (d.assignee || d.duedate || d.startdate) {
        add(d.assignee, {
          type: 'Deliverable', sec: s.sec, title: dt,
          dueDate: d.duedate || '', startDate: d.startdate || '',
          status: d.done ? 'green' : (t.ryg || 'unset'),
          owner: d.assignee || ''
        });
      }
    });
    // Subtask-level
    (t.subtasks || []).forEach(st => {
      if (st.assignee || st.duedate || st.startdate) {
        add(st.assignee, {
          type: 'Subtask', sec: s.sec, title: st.text || '(unnamed)',
          dueDate: st.duedate || '', startDate: st.startdate || '',
          status: st.done ? 'green' : (t.ryg || 'unset'),
          owner: st.assignee || ''
        });
      }
    });
    // Criteria-level (assignee or tester with date)
    if (s.criteria && s.criteria.length) {
      const stMap = t.criteria || {};
      const filt = filterCriteria(s.criteria, s);
      filt.forEach(c => {
        const st = stMap[c.id] || {};
        const who = st.assignee || st.tester;
        if (who && (st.date || st.state)) {
          const statusMap = {pass:'green', fail:'red', prog:'yellow', na:'unset', unset:'unset'};
          add(who, {
            type: 'Criterion', sec: s.sec, title: c.id + ': ' + c.text.slice(0, 50) + (c.text.length>50?'…':''),
            dueDate: st.date || '', startDate: '',
            status: statusMap[st.state || 'unset'] || 'unset',
            owner: who
          });
        }
      });
    }
  });
  return owners;
}



// ══════════════════════════════════════════════════════════
//  GANTT CHART
// ══════════════════════════════════════════════════════════
function _collectGanttItems() {
  // Same shape as workload items but only those that get plotted:
  // Section + Deliverable + Subtask (NOT Criterion).
  // Each item needs both startDate AND dueDate to be plottable.
  if (Object.keys(answers).length !== QUESTIONS.length) return { scheduled: [], unscheduled: [] };
  const applic = determineApplicableSections();
  const scheduled = [];
  const unscheduled = [];
  SECTIONS.forEach(s => {
    const a = applic[s.sec];
    if (!a || !a.applies) return;
    const t = tracking[s.sec];
    if (!t) return;
    // Section
    if (t.owner || t.duedate || t.startdate) {
      const item = {
        type: 'Section', sec: s.sec, part: s.part, series: s.part, title: s.title,
        startDate: t.startdate || '', dueDate: t.duedate || '',
        status: t.ryg || 'unset', owner: t.owner || ''
      };
      if (item.startDate && item.dueDate) scheduled.push(item);
      else unscheduled.push(item);
    }
    // Deliverables
    (s.deliverables || []).forEach((dt, i) => {
      const d = (t.deliverables || [])[i];
      if (!d) return;
      if (d.assignee || d.duedate || d.startdate) {
        const item = {
          type: 'Deliverable', sec: s.sec, part: s.part, series: s.part, title: dt,
          startDate: d.startdate || '', dueDate: d.duedate || '',
          status: d.done ? 'green' : (t.ryg || 'unset'), owner: d.assignee || ''
        };
        if (item.startDate && item.dueDate) scheduled.push(item);
        else unscheduled.push(item);
      }
    });
    // Subtasks
    (t.subtasks || []).forEach(st => {
      if (st.assignee || st.duedate || st.startdate) {
        const item = {
          type: 'Subtask', sec: s.sec, part: s.part, series: s.part, title: st.text || '(unnamed)',
          startDate: st.startdate || '', dueDate: st.duedate || '',
          status: st.done ? 'green' : (t.ryg || 'unset'), owner: st.assignee || ''
        };
        if (item.startDate && item.dueDate) scheduled.push(item);
        else unscheduled.push(item);
      }
    });
  });
  return { scheduled, unscheduled };
}

function _seriesKey(item) {
  if (!item || !item.part) return 'cert';
  const p = item.part;
  if (p === 86)   return '100';  // → bar-100 (blue)
  if (p === 1036) return '200';  // → bar-200 (red)
  if (p === 1037) return '300';  // → bar-300 (amber)
  if (p === 1065) return '400';  // → bar-400 (teal)
  if (p === 1066) return '1066'; // → bar-1066 (purple)
  return 'cert';
}

function _parseDate(s) {
  if (!s) return null;
  const d = new Date(s + 'T00:00:00');
  return isNaN(d.getTime()) ? null : d;
}

function _daysBetween(d1, d2) {
  return Math.round((d2 - d1) / (1000 * 60 * 60 * 24));
}

function _formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function _renderGanttSVG(items, groupBy, resolution) {
  // Determine X-axis range
  const today = new Date(); today.setHours(0,0,0,0);
  let minDate = new Date(today); minDate.setDate(minDate.getDate() - 30);
  let maxDate = projectEnd ? _parseDate(projectEnd) : null;
  if (!maxDate) {
    maxDate = new Date(today); maxDate.setDate(maxDate.getDate() + 180);
  } else {
    maxDate = new Date(maxDate); maxDate.setDate(maxDate.getDate() + 30);
  }
  // Extend to include any item past max
  items.forEach(it => {
    const s = _parseDate(it.startDate), e = _parseDate(it.dueDate);
    if (s && s < minDate) minDate = s;
    if (e && e > maxDate) maxDate = e;
  });

  const totalDays = _daysBetween(minDate, maxDate);
  if (totalDays <= 0) return '<div class="gantt-empty">No date range to plot.</div>';

  // Group items
  const groups = {};
  items.forEach(it => {
    const key = groupBy === 'user'
      ? (it.owner && it.owner.trim() ? it.owner.trim() : '(Unassigned)')
      : ('§' + it.sec);
    if (!groups[key]) groups[key] = [];
    groups[key].push(it);
  });
  const groupKeys = Object.keys(groups).sort((a,b) => {
    if (a === '(Unassigned)') return 1;
    if (b === '(Unassigned)') return -1;
    return a.localeCompare(b);
  });

  // Sort each group's items by start date asc
  groupKeys.forEach(k => {
    groups[k].sort((a,b) => _parseDate(a.startDate) - _parseDate(b.startDate));
  });

  // Layout constants
  const ROW_HEIGHT = 28;
  const ROW_HEADER_HEIGHT = 22;
  const LABEL_COL_WIDTH = 200;
  const HEADER_HEIGHT = 50;
  const BAR_HEIGHT = 18;
  const BAR_TOP_PAD = (ROW_HEIGHT - BAR_HEIGHT) / 2;
  const MIN_WIDTH_PER_DAY = resolution === 'day' ? 24 : (resolution === 'month' ? 3 : 8);
  const chartWidth = Math.max(800, totalDays * MIN_WIDTH_PER_DAY);
  const widthPerDay = chartWidth / totalDays;

  // Compute total rows for height
  let totalRows = 0;
  groupKeys.forEach(k => { totalRows += 1 + groups[k].length; });  // header + items
  const totalHeight = HEADER_HEIGHT + totalRows * ROW_HEIGHT + 20;

  const svgWidth = LABEL_COL_WIDTH + chartWidth;

  let svg = '<svg class="gantt-svg" width="' + svgWidth + '" height="' + totalHeight + '" viewBox="0 0 ' + svgWidth + ' ' + totalHeight + '">';

  // ── X-axis: gridlines and labels ──
  // Major: months. Minor: weeks or days.
  let cursor = new Date(minDate);
  while (cursor <= maxDate) {
    const x = LABEL_COL_WIDTH + _daysBetween(minDate, cursor) * widthPerDay;
    // Month boundary?
    const isFirstOfMonth = cursor.getDate() === 1;
    const isStart = cursor.getTime() === minDate.getTime();
    if (isFirstOfMonth || isStart) {
      svg += '<line class="gantt-grid-line major" x1="' + x + '" y1="' + HEADER_HEIGHT + '" x2="' + x + '" y2="' + totalHeight + '"/>';
      const monthLabel = cursor.toLocaleString('en-US', { month: 'short', year: 'numeric' });
      svg += '<text class="gantt-axis-label month" x="' + (x + 4) + '" y="20">' + monthLabel + '</text>';
    }
    if (resolution === 'week' && cursor.getDay() === 1) {
      svg += '<line class="gantt-grid-line" x1="' + x + '" y1="' + HEADER_HEIGHT + '" x2="' + x + '" y2="' + totalHeight + '"/>';
      svg += '<text class="gantt-axis-label" x="' + (x + 2) + '" y="36">' + (cursor.getMonth()+1) + '/' + cursor.getDate() + '</text>';
    }
    if (resolution === 'day') {
      svg += '<line class="gantt-grid-line" x1="' + x + '" y1="' + HEADER_HEIGHT + '" x2="' + x + '" y2="' + totalHeight + '"/>';
      if (cursor.getDay() === 1) {
        svg += '<text class="gantt-axis-label" x="' + (x + 2) + '" y="36">' + (cursor.getMonth()+1) + '/' + cursor.getDate() + '</text>';
      }
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  // Today line
  if (today >= minDate && today <= maxDate) {
    const x = LABEL_COL_WIDTH + _daysBetween(minDate, today) * widthPerDay;
    svg += '<line class="gantt-grid-line today" x1="' + x + '" y1="' + HEADER_HEIGHT + '" x2="' + x + '" y2="' + totalHeight + '"/>';
    svg += '<text class="gantt-axis-label" x="' + (x + 4) + '" y="' + (HEADER_HEIGHT - 4) + '" style="fill:var(--accent);font-weight:700">Today</text>';
  }
  // Vertical separator between label column and chart
  svg += '<line class="gantt-grid-line major" x1="' + LABEL_COL_WIDTH + '" y1="0" x2="' + LABEL_COL_WIDTH + '" y2="' + totalHeight + '"/>';

  // ── Group rows ──
  let yCursor = HEADER_HEIGHT;
  let altBand = false;
  groupKeys.forEach(key => {
    // Group header
    svg += '<rect class="gantt-row-band" x="0" y="' + yCursor + '" width="' + svgWidth + '" height="' + ROW_HEADER_HEIGHT + '"/>';
    svg += '<text class="gantt-row-label" x="10" y="' + (yCursor + ROW_HEADER_HEIGHT - 6) + '">' + key + '</text>';
    svg += '<text class="gantt-row-sublabel" x="' + (LABEL_COL_WIDTH - 50) + '" y="' + (yCursor + ROW_HEADER_HEIGHT - 6) + '">' + groups[key].length + ' item' + (groups[key].length === 1 ? '' : 's') + '</text>';
    yCursor += ROW_HEADER_HEIGHT;

    // Item rows
    groups[key].forEach(item => {
      // Alternating band
      if (altBand) svg += '<rect class="gantt-row-band alt" x="0" y="' + yCursor + '" width="' + svgWidth + '" height="' + ROW_HEIGHT + '"/>';
      else         svg += '<rect class="gantt-row-band" x="0" y="' + yCursor + '" width="' + svgWidth + '" height="' + ROW_HEIGHT + '"/>';
      altBand = !altBand;

      // Item label
      const labelText = item.type + ': ' + (item.title.length > 24 ? item.title.slice(0,24) + '…' : item.title);
      const sublabel = '§' + item.sec + (groupBy === 'section' ? ' · ' + (item.owner || 'unassigned') : '');
      svg += '<text class="gantt-row-label" x="14" y="' + (yCursor + 13) + '" style="font-size:10px">' + labelText + '</text>';
      svg += '<text class="gantt-row-sublabel" x="14" y="' + (yCursor + 23) + '">' + sublabel + '</text>';

      // Bar
      const startD = _parseDate(item.startDate);
      const endD = _parseDate(item.dueDate);
      if (startD && endD) {
        const xStart = LABEL_COL_WIDTH + _daysBetween(minDate, startD) * widthPerDay;
        const days = Math.max(1, _daysBetween(startD, endD));
        const barWidth = days * widthPerDay;
        const seriesKey = _seriesKey(item);
        const overdue = (item.status !== 'green' && endD < today);
        const overdueCls = overdue ? ' bar-overdue' : '';
        const barCls = 'bar-' + seriesKey + overdueCls;
        const sec = item.sec.replace(/'/g, "\\'");
        svg += '<g class="gantt-bar ' + barCls + '" onclick="navigateToSection(\'' + sec + '\')">';
        svg += '<rect x="' + xStart + '" y="' + (yCursor + BAR_TOP_PAD) + '" width="' + barWidth + '" height="' + BAR_HEIGHT + '" rx="3"/>';
        // Bar label inside the bar if room
        if (barWidth > 50) {
          svg += '<text x="' + (xStart + 6) + '" y="' + (yCursor + BAR_TOP_PAD + 13) + '">' + (item.title.length > 18 ? item.title.slice(0,18) + '…' : item.title) + '</text>';
        }
        svg += '<title>' + item.type + ': ' + item.title + ' (' + item.startDate + ' → ' + item.dueDate + ')' + (item.owner ? ' — ' + item.owner : '') + '</title>';
        svg += '</g>';
      }
      yCursor += ROW_HEIGHT;
    });
  });

  svg += '</svg>';
  return svg;
}

function renderWorkloadGantt(view) {
  const { scheduled, unscheduled } = _collectGanttItems();

  let html = '<div style="padding:24px;">';
  html += '<h2 style="font-size:18px;font-weight:700;margin-bottom:6px;">Workload</h2>';

  // View toggle
  html += '<div class="wl-view-toggle">';
  html += '<button class="' + (workloadView === 'list' ? 'active' : '') + '" onclick="setWorkloadView(\'list\')">List</button>';
  html += '<button class="' + (workloadView === 'gantt' ? 'active' : '') + '" onclick="setWorkloadView(\'gantt\')">Gantt</button>';
  html += '</div>';

  // Gantt controls
  html += '<div class="wl-controls">';
  html += '<span class="wl-control-label">Group by</span>';
  html += '<div class="wl-control-group">';
  html += '<button class="' + (ganttGroupBy === 'user' ? 'active' : '') + '" onclick="setGanttGroupBy(\'user\')">User</button>';
  html += '<button class="' + (ganttGroupBy === 'section' ? 'active' : '') + '" onclick="setGanttGroupBy(\'section\')">Section</button>';
  html += '</div>';
  html += '<span class="wl-control-label">Resolution</span>';
  html += '<div class="wl-control-group">';
  ['day','week','month'].forEach(function(r) {
    html += '<button class="' + (ganttResolution === r ? 'active' : '') + '" onclick="setGanttResolution(\'' + r + '\')">' + r.charAt(0).toUpperCase() + r.slice(1) + '</button>';
  });
  html += '</div>';
  html += '<span class="wl-control-label" style="margin-left:auto">' + scheduled.length + ' scheduled · ' + unscheduled.length + ' unscheduled</span>';
  html += '</div>';

  // Gantt + Unscheduled panel
  html += '<div class="gantt-wrap">';
  html += '<div class="gantt-main">';
  if (!scheduled.length) {
    html += '<div class="gantt-empty">No scheduled items. Add start AND due dates to items to see them here.</div>';
  } else {
    html += _renderGanttSVG(scheduled, ganttGroupBy, ganttResolution);
  }
  html += '</div>';

  // Unscheduled side panel
  html += '<div class="gantt-unsched">';
  html += '<div class="gantt-unsched-title">Unscheduled (' + unscheduled.length + ')</div>';
  if (!unscheduled.length) {
    html += '<div style="font-size:11px;color:var(--text3);font-style:italic;">All items have dates.</div>';
  } else {
    html += '<div style="font-size:10px;color:var(--text3);margin-bottom:8px;">Items missing start or due date.</div>';
    // Section summary chips — distinct section numbers with counts
    const secCounts = {};
    unscheduled.forEach(it => { secCounts[it.sec] = (secCounts[it.sec] || 0) + 1; });
    const secOrder = Object.keys(secCounts).sort((a, b) => {
      const an = parseFloat(a), bn = parseFloat(b);
      if (an !== bn) return an - bn;
      return a.localeCompare(b);
    });
    html += '<div class="gantt-unsched-secchips">';
    html += '<div class="gantt-unsched-chips-label">Affected Sections (' + secOrder.length + ')</div>';
    html += '<div class="gantt-unsched-chips">';
    secOrder.forEach(s => {
      html += '<span class="gantt-unsched-chip" onclick="event.stopPropagation();navigateToSection(\'' + s.replace(/'/g, "\'") + '\')" title="Jump to §' + s + '">§' + s + ' <span class="gantt-unsched-chip-n">' + secCounts[s] + '</span></span>';
    });
    html += '</div>';
    html += '</div>';
    html += '<div class="gantt-unsched-itemslabel">All items</div>';
    unscheduled.forEach(it => {
      html += '<div class="gantt-unsched-item" onclick="navigateToSection(\'' + it.sec.replace(/'/g, "\\'") + '\')">';
      html += '<div class="gantt-unsched-sec">§' + it.sec + ' · ' + it.type + '</div>';
      html += '<div class="gantt-unsched-title-row">' + (it.title.length > 36 ? it.title.slice(0,36) + '…' : it.title) + '</div>';
      if (it.owner) html += '<div class="gantt-unsched-owner">' + it.owner + '</div>';
      html += '</div>';
    });
  }
  html += '</div>';
  html += '</div>';
  html += '</div>';

  view.innerHTML = html;
}

function setWorkloadView(v) {
  workloadView = v;
  renderWorkload();
}
function setGanttGroupBy(g) {
  ganttGroupBy = g;
  renderWorkload();
}
function setGanttResolution(r) {
  ganttResolution = r;
  renderWorkload();
}


function renderWorkload() {
  const view = document.getElementById('view-workload');
  if (!view) return;
  document.getElementById('topbar-sub').textContent = 'Owner workload view';
  // Delegate based on selected view mode
  if (workloadView === 'gantt') {
    renderWorkloadGantt(view);
    return;
  }
  const owners = _collectOwnerItems();
  const ownerNames = Object.keys(owners).sort((a, b) => {
    if (a === '(Unassigned)') return 1;
    if (b === '(Unassigned)') return -1;
    return a.localeCompare(b);
  });

  // Aggregate counts
  let totalItems = 0, totalOverdue = 0, totalWeek = 0, totalMonth = 0;
  ownerNames.forEach(n => {
    owners[n].forEach(item => {
      totalItems++;
      const d = _daysUntil(item.dueDate);
      if (d !== null) {
        if (d < 0 && item.status !== 'green') totalOverdue++;
        else if (d <= 7 && item.status !== 'green') totalWeek++;
        else if (d <= 30 && item.status !== 'green') totalMonth++;
      }
    });
  });

  let html = '<div style="padding:24px;">';
  html += '<h2 style="font-size:18px;font-weight:700;margin-bottom:6px;">Workload</h2>';
  // View toggle
  html += '<div class="wl-view-toggle">';
  html += '<button class="' + (workloadView === 'list' ? 'active' : '') + '" onclick="setWorkloadView(\'list\')">List</button>';
  html += '<button class="' + (workloadView === 'gantt' ? 'active' : '') + '" onclick="setWorkloadView(\'gantt\')">Gantt</button>';
  html += '</div>';
  html += '<div style="font-size:12px;color:var(--text3);margin-bottom:18px;">Pivots applicable items by assignee, grouped by due-date proximity.</div>';

  html += '<div class="workload-summary">';
  html += '<div class="wl-stat-box"><div class="wl-stat-label">Total Items</div><div class="wl-stat-val blue">' + totalItems + '</div></div>';
  html += '<div class="wl-stat-box"><div class="wl-stat-label">Overdue</div><div class="wl-stat-val red">' + totalOverdue + '</div></div>';
  html += '<div class="wl-stat-box"><div class="wl-stat-label">This Week</div><div class="wl-stat-val yellow">' + totalWeek + '</div></div>';
  html += '<div class="wl-stat-box"><div class="wl-stat-label">This Month</div><div class="wl-stat-val blue">' + totalMonth + '</div></div>';
  html += '<div class="wl-stat-box"><div class="wl-stat-label">Owners</div><div class="wl-stat-val">' + ownerNames.length + '</div></div>';
  html += '</div>';

  if (!ownerNames.length) {
    html += '<div style="color:var(--text3);font-style:italic;padding:16px 0;">No items have been assigned yet. Add owners or assignees to section tracking, deliverables, or subtasks.</div>';
    html += '</div>';
    view.innerHTML = html;
    return;
  }

  ownerNames.forEach(name => {
    const items = owners[name];
    // bucket
    const buckets = { overdue: [], week: [], month: [], future: [], nodate: [] };
    items.forEach(item => {
      const days = _daysUntil(item.dueDate);
      if (item.status === 'green') {
        buckets.future.push(Object.assign({_days: days}, item));
      } else {
        buckets[_bucketForDays(days)].push(Object.assign({_days: days}, item));
      }
    });
    const overdueCount = buckets.overdue.length;
    const weekCount = buckets.week.length;
    const monthCount = buckets.month.length;
    const greenCount = items.filter(i => i.status === 'green').length;

    html += '<div class="owner-card">';
    html += '<div class="owner-card-head" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">';
    html += '<div class="owner-name"><div class="owner-avatar">' + _initials(name) + '</div>' + name + '</div>';
    html += '<div class="owner-stats">';
    html += '<span class="owner-stat">' + items.length + ' items</span>';
    if (overdueCount) html += '<span class="owner-stat red">' + overdueCount + ' overdue</span>';
    if (weekCount) html += '<span class="owner-stat yellow">' + weekCount + ' this week</span>';
    if (monthCount) html += '<span class="owner-stat">' + monthCount + ' this month</span>';
    if (greenCount) html += '<span class="owner-stat green">' + greenCount + ' on schedule</span>';
    html += '</div></div>';
    html += '<div class="owner-card-body">';

    const bucketOrder = [
      ['overdue', 'Overdue', 'bk-overdue'],
      ['week', 'Due This Week', 'bk-week'],
      ['month', 'Due This Month', 'bk-month'],
      ['future', 'Future', 'bk-future'],
      ['nodate', 'No Due Date', 'bk-nodate'],
    ];
    bucketOrder.forEach(b => {
      const list = buckets[b[0]];
      if (!list.length) return;
      // sort by date asc within bucket
      list.sort((a, x) => {
        if (a._days === null) return 1;
        if (x._days === null) return -1;
        return a._days - x._days;
      });
      html += '<div class="bucket">';
      html += '<div class="bucket-title ' + b[2] + '">' + b[1] + ' (' + list.length + ')</div>';
      list.forEach(it => {
        let dueDisp = '';
        if (it.dueDate) {
          dueDisp = it.dueDate;
          if (it._days !== null) {
            if (it._days < 0) dueDisp += ' <span class="due-overdue">(' + Math.abs(it._days) + 'd late)</span>';
            else if (it._days <= 7) dueDisp += ' <span class="due-soon">(' + it._days + 'd)</span>';
          }
        } else dueDisp = '<span style="color:var(--text3)">—</span>';
        const statusLabel = it.status === 'green' ? '🟢' : it.status === 'yellow' ? '🟡' : it.status === 'red' ? '🔴' : '○';
        html += '<div class="bucket-row" onclick="navigateToSection(\'' + it.sec + '\')">';
        html += '<span class="br-sec">§' + it.sec + '</span>';
        html += '<span class="br-title">' + (it.type === 'Section' ? '<strong>' + it.title + '</strong>' : it.type + ': ' + it.title) + '</span>';
        html += '<span class="br-due">' + dueDisp + '</span>';
        html += '<span class="br-status">' + statusLabel + ' ' + it.status + '</span>';
        html += '</div>';
      });
      html += '</div>';
    });

    html += '</div></div>';
  });
  html += '</div>';
  view.innerHTML = html;
}

// ══════════════════════════════════════════════════════════
//  COMPLIANCE SUMMARY REPORT
// ══════════════════════════════════════════════════════════
function _buildReportData() {
  const applic = determineApplicableSections();
  const applicSecs = SECTIONS.filter(s => applic[s.sec] && applic[s.sec].applies);
  const supersededSecs = SECTIONS.filter(s => applic[s.sec] && applic[s.sec].superseded);

  // Vehicle classification text
  const classText = QUESTIONS.map(q => {
    const a = answers[q.id];
    let val = '—';
    if (a !== undefined && a !== null) {
      const _o = Array.isArray(q.options) ? q.options.concat([TBD_OPT]) : [TBD_OPT];
      const _l = v => (_o.find(o => o.val === v) || {label: String(v)}).label;
      if (Array.isArray(a)) val = a.map(_l).join(', ');
      else val = _l(a);
    }
    return { q: q.text, a: val };
  });

  // Status summary
  const totalApplic = applicSecs.length;
  let green = 0, yellow = 0, red = 0, unset = 0, totalPct = 0;
  applicSecs.forEach(s => {
    const t = tracking[s.sec] || {};
    const r = t.ryg || 'unset';
    if (r === 'green') green++;
    else if (r === 'yellow') yellow++;
    else if (r === 'red') red++;
    else unset++;
    totalPct += t.pct || 0;
  });
  const avgPct = totalApplic ? Math.round(totalPct / totalApplic) : 0;

  // By series
  const seriesData = {};
  applicSecs.forEach(s => {
    const k = s.series === 567 || s.series === 568 ? 'cert' : String(Math.floor(s.series / 100) * 100);
    if (!seriesData[k]) seriesData[k] = { total: 0, sumPct: 0, green: 0 };
    seriesData[k].total++;
    seriesData[k].sumPct += (tracking[s.sec] || {}).pct || 0;
    if ((tracking[s.sec] || {}).ryg === 'green') seriesData[k].green++;
  });

  // Today
  const today = new Date(); today.setHours(0,0,0,0);

  // Overdue: red OR (duedate < today AND status != green)
  const overdue = applicSecs.filter(s => {
    const t = tracking[s.sec] || {};
    if (t.ryg === 'green') return false;
    if (t.ryg === 'red') return true;
    if (t.duedate) {
      const d = new Date(t.duedate + 'T00:00:00');
      if (!isNaN(d.getTime()) && d < today) return true;
    }
    return false;
  });

  // Unstarted mandatory: applicable + mandatory + ryg=unset + pct=0
  const unstarted = applicSecs.filter(s => {
    const t = tracking[s.sec] || {};
    return s.mandatory && (!t.ryg || t.ryg === 'unset') && (!t.pct || t.pct === 0);
  });

  // Validation warnings + criteria stats
  const warnings = [];
  let totalCrits = 0, totalCritPass = 0, totalCritFail = 0, totalCritProg = 0;
  applicSecs.forEach(s => {
    const t = tracking[s.sec] || {};
    if (t.ryg === 'green' && (!t.pct || t.pct < 100)) {
      warnings.push({sec: s.sec, msg: 'Marked GREEN but ' + (t.pct || 0) + '% complete'});
    }
    if (t.ryg === 'green' && !t.duedate) {
      warnings.push({sec: s.sec, msg: 'Marked GREEN but no due date set'});
    }
    if (t.duedate && t.startdate && new Date(t.startdate) > new Date(t.duedate)) {
      warnings.push({sec: s.sec, msg: 'Start date is after due date'});
    }
    if (projectEnd && t.duedate && new Date(t.duedate) > new Date(projectEnd)) {
      warnings.push({sec: s.sec, msg: 'Due date is after project end (' + projectEnd + ')'});
    }
    const ds = s.deliverables || [];
    const td = t.deliverables || [];
    if (ds.length && td.length === ds.length && td.every(d => d && d.done) && t.ryg !== 'green') {
      warnings.push({sec: s.sec, msg: 'All deliverables complete but RYG not green'});
    }
    // Criteria-based warnings + roll-up
    if (s.criteria && s.criteria.length) {
      const filt = filterCriteria(s.criteria, s);
      const stats = _critStats(filt, s.sec);
      totalCrits += stats.total;
      totalCritPass += stats.pass;
      totalCritFail += stats.fail;
      totalCritProg += stats.prog;
      if (t.ryg === 'green' && stats.fail > 0) {
        warnings.push({sec: s.sec, msg: 'Marked GREEN but ' + stats.fail + ' criteria failing'});
      }
      if (t.ryg === 'green' && stats.unset > 0) {
        warnings.push({sec: s.sec, msg: 'Marked GREEN but ' + stats.unset + ' criteria unset'});
      }
      const evaluable = stats.total - stats.na;
      if (evaluable > 0 && stats.pass === evaluable && t.ryg !== 'green' && t.ryg !== 'unset') {
        warnings.push({sec: s.sec, msg: 'All criteria pass but RYG = ' + t.ryg});
      }
    }
  });

  return {
    classText, applicSecs, supersededSecs,
    totalApplic, green, yellow, red, unset, avgPct,
    seriesData, overdue, unstarted, warnings,
    totalCrits, totalCritPass, totalCritFail, totalCritProg,
    generatedAt: new Date().toLocaleString()
  };
}

function _seriesLabel(k) {
  return ({100:'Crash Avoidance (100s)', 200:'Crashworthiness (200s)', 300:'Post-Crash (300s)', 400:'Miscellaneous (400s)', cert:'Certification (567/568)'})[k] || k;
}

function exportCSV() {
  const applic = determineApplicableSections();
  const rows = [['Standard','Title','Part','Applies','RYG','Owner','Start Date','Due Date','% Complete','Notes','Row Type','Item','Item Done','Item Assignee','Item Start','Item Due']];
  SECTIONS.forEach(s => {
    const a = applic[s.sec];
    const t = tracking[s.sec] || {};
    const startd = t.startdate || t.enddate || '';
    const dued = t.duedate || t.due || '';
    const base = [s.sec, s.title, (s.subpart||s.sub||''), a ? (a.applies ? (a.uncertain ? 'Possibly' : 'Yes') : 'No') : '', t.ryg||'', t.owner||'', startd, dued, t.pct||0, (t.notes||'').replace(/\n/g,' ')];
    const delivs = t.deliverables || [];
    const subs = t.subtasks || [];
    let anyRows = false;
    // Deliverable rows
    (s.deliverables || []).forEach((dt, i) => {
      const d = delivs[i] || {};
      rows.push([...base, 'Deliverable', dt, d.done?'Done':'Pending', d.assignee||'', d.startdate||'', d.duedate||'']);
      anyRows = true;
    });
    // Subtask rows
    subs.forEach(st => {
      rows.push([...base, 'Subtask', st.text||'', st.done?'Done':'Pending', st.assignee||'', st.startdate||'', st.duedate||st.enddate||'']);
      anyRows = true;
    });
    // Criteria rows
    if (s.criteria && s.criteria.length) {
      const stMap = (t.criteria || {});
      const filt = filterCriteria(s.criteria, s);
      filt.forEach(c => {
        const st = stMap[c.id] || {};
        rows.push([...base, 'Criterion ('+c.id+' '+(c.ref||'')+')', c.text, st.state||'unset', st.tester||st.assignee||'', st.date||'', st.evidence||'']);
        anyRows = true;
      });
    }
    if (!anyRows) rows.push([...base, '', '', '', '', '', '']);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  download('epatrac-export.csv', csv, 'text/csv');
}

function handleImport(evt) {
  const f = evt.target.files[0]; if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const d = JSON.parse(e.target.result);
      if (d.answers) answers = d.answers;
      if (d.tracking) tracking = d.tracking;
      if (d.projectEnd) projectEnd = d.projectEnd;
      if (Array.isArray(d.users)) users = d.users;
      // Migrate any tracking entries from older formats
      Object.keys(tracking).forEach(sec => { try { ensureTracking(sec); } catch(e) {} });
      // If backup predates v7 (no users array) auto-migrate legacy assignees so the user list is populated
      if (!users.length) _migrateLegacyAssignees();
      saveData();
      renderUserDatalist();
      alert('Import successful! Imported ' + (users.length) + ' user' + (users.length === 1 ? '' : 's') + '.');
      showView(classifyComplete() ? 'results' : 'wizard');
    } catch(err) { alert('Invalid JSON file: ' + err.message); }
  };
  reader.readAsText(f);
}

function download(filename, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: mime }));
  a.download = filename;
  a.click();
}

  subs:[], tests:[], forms:[],
  criteria:[
    {id:'1066.15-AC-01', ref:'(a)', text:'All applicable exhaust constituents are measured: NOx, HC (THC/NMHC/NMOG as required), PM, CO, CO2, CH4, N2O, and CH2O; constituents not subject to a standard in the standard-setting part may be omitted only if the standard-setting part explicitly allows omission.', type:'test'},

    {id:'1066.15-AC-03', ref:'(c)(2)(ii)', text:'If batch sampling is used, a proportional sample is continuously extracted and stored in an appropriate container (e.g., Tedlar bag for gaseous species, filter for PM); concentrations are measured after the test interval and multiplied by total exhaust flow to obtain mass.', type:'test'},
    {id:'1066.15-AC-04', ref:'(e)', text:'Good engineering judgment is applied for all aspects of testing; this requirement applies universally even where not explicitly re-stated in individual sections.', type:'cert'}
